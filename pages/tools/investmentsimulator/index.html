<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Inversiones Pro - V3</title>
    <style>
        :root {
            --primary-color: #2b5cff;
            --primary-hover: #1e45c7;
            --bg-color: #f4f7f9;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --border-color: #e1e4e8;
            --success-color: #00a650;
            --danger-color: #e74c3c;
            --edit-color: #f39c12;
            --radius: 12px;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 2rem;
        }

        .calculator-card, .history-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            height: fit-content;
        }

        h2, h3 { margin-bottom: 1.5rem; color: var(--primary-color); }
        .edit-mode-title { color: var(--edit-color) !important; }

        .form-group { margin-bottom: 1rem; display: flex; flex-direction: column; }
        .form-group label { margin-bottom: 0.5rem; font-weight: 600; font-size: 0.85rem; color: var(--text-muted); }

        input {
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        input:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(43, 92, 255, 0.1); }

        .form-row { display: flex; gap: 1rem; }
        .form-row .form-group { flex: 1; }

        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin: 1rem 0; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .checkbox-sub { margin: 0.5rem 0 1rem 0; font-weight: 400; font-size: 0.85rem; color: var(--text-main); }

        .hidden-section {
            display: none;
            background-color: #f9fafc;
            padding: 1.2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }
        .hidden-section.active { display: block; animation: fadeIn 0.3s; }

        .button-group { display: flex; gap: 10px; margin-top: 1rem; }

        .btn-main {
            flex: 2;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn-main.editing { background-color: var(--edit-color); }

        .btn-cancel {
            flex: 1;
            background-color: #ecf0f1;
            color: var(--text-main);
            border: none;
            padding: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            display: none;
        }

        .history-list { list-style: none; }
        .history-item {
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover { background: #f8faff; }
        .history-item.active-edit { border-left: 4px solid var(--edit-color); background: #fffdf9; }
        .history-item .info b { display: block; font-size: 0.9rem; }
        .history-item .info span { font-size: 0.75rem; color: var(--text-muted); }
        
        .btn-del { background: none; border: none; color: var(--danger-color); cursor: pointer; padding: 5px; font-size: 1.2rem; }

        .results { margin-top: 2rem; display: none; border-top: 2px dashed var(--border-color); padding-top: 1.5rem; }

        .period-item {
            background: var(--bg-color);
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem; }
        .summary-box { background: #f9fafc; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 0.85rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="calculator-card">
            <h2 id="formTitle">Nueva Simulación</h2>
            
            <div class="form-group">
                <label>Nombre de la inversión</label>
                <input type="text" id="nombreInv" placeholder="Ej: Mi CDT Mayo">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Monto Inicial</label>
                    <input type="text" id="montoInicial" class="currency-input" data-value="0">
                </div>
                <div class="form-group">
                    <label>Tasa E.A. (%)</label>
                    <input type="number" id="tasaEA" step="0.01" placeholder="0.00">
                </div>
            </div>

            <div class="form-group">
                <label>Tiempo (Días)</label>
                <input type="number" id="dias" placeholder="Mínimo 30">
            </div>

            <label class="checkbox-group">
                <input type="checkbox" id="chkReinvertir"> Activar reinversión automática
            </label>

            <div class="hidden-section" id="seccionReinversion">
                <div class="form-row">
                    <div class="form-group">
                        <label>Reinversiones</label>
                        <input type="number" id="numReinversiones" min="1" value="1">
                    </div>
                    <div class="form-group">
                        <label>Abono extra por vez</label>
                        <input type="text" id="abonoExtra" class="currency-input" data-value="0">
                    </div>
                </div>
                <label class="checkbox-group checkbox-sub">
                    <input type="checkbox" id="chkReinvertirGanancias" checked> 
                    Incluir ganancias del periodo anterior en la reinversión (Interés compuesto)
                </label>
            </div>

            <div class="button-group">
                <button class="btn-main" id="btnGuardar" onclick="procesarSimulacion()">Calcular y Guardar</button>
                <button class="btn-cancel" id="btnCancelar" onclick="resetForm()">Cancelar</button>
            </div>

            <div class="results" id="resultados">
                <h3 style="font-size: 1.1rem; margin-bottom: 1rem;">Desglose por Periodos</h3>
                <div id="listaPeriodos"></div>
                <div class="summary-grid">
                    <div class="summary-box"><span>Total Ganancias (Netas):</span><br><strong id="resGanancias"></strong></div>
                    <div class="summary-box" style="background: #eef2ff;"><span>Total Final Acumulado:</span><br><strong id="resTotal"></strong></div>
                </div>
            </div>
        </div>

        <div class="history-card">
            <h3>Guardadas</h3>
            <div id="emptyMsg" style="color: var(--text-muted); font-size: 0.8rem;">No hay simulaciones guardadas.</div>
            <ul class="history-list" id="historyList"></ul>
        </div>
    </div>

    <script>
        const formatter = new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 });
        let db = JSON.parse(localStorage.getItem('inv_simulations')) || [];
        let editIndex = null;

        // Formateo de inputs
        document.querySelectorAll('.currency-input').forEach(input => {
            input.addEventListener('focus', (e) => {
                const rawValue = e.target.getAttribute('data-value') || "0";
                e.target.value = rawValue === "0" ? "" : rawValue;
            });
            input.addEventListener('blur', (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                const numVal = parseInt(val) || 0;
                e.target.setAttribute('data-value', numVal);
                e.target.value = formatter.format(numVal);
            });
            input.value = formatter.format(0);
        });

        document.getElementById('chkReinvertir').addEventListener('change', e => {
            document.getElementById('seccionReinversion').classList.toggle('active', e.target.checked);
        });

        function renderHistory() {
            const list = document.getElementById('historyList');
            const empty = document.getElementById('emptyMsg');
            list.innerHTML = '';
            if (db.length === 0) { empty.style.display = 'block'; return; }
            empty.style.display = 'none';

            db.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `history-item ${editIndex === index ? 'active-edit' : ''}`;
                li.innerHTML = `
                    <div class="info" onclick="cargarSimulacion(${index})" style="flex-grow: 1;">
                        <b>${item.nombre}</b>
                        <span>${formatter.format(item.totalFinal)} (${item.dias} días)</span>
                    </div>
                    <button class="btn-del" onclick="eliminarSimulacion(event, ${index})">&times;</button>
                `;
                list.appendChild(li);
            });
        }

        function calcularDatosRender(montoInicial, tasaEA, dias, numR, extra, reinvGanancias) {
            const tasaPeriodo = Math.pow(1 + (tasaEA/100), dias/365) - 1;
            let capitalInvertido = montoInicial;
            let gananciasNetasTotal = 0;
            let htmlPeriodos = '';

            for(let i = 0; i <= numR; i++) {
                if(i > 0) capitalInvertido += extra; // Sumar abono extra si aplica
                
                let gBruta = capitalInvertido * tasaPeriodo;
                let neta = gBruta * 0.96; // 4% de retención en la fuente
                
                htmlPeriodos += `<div class="period-item">
                    <div><strong>Periodo ${i + 1}</strong><br><span style="color:var(--text-muted); font-size:0.8rem;">Capital Base: ${formatter.format(capitalInvertido)}</span></div>
                    <div style="color:var(--success-color); font-weight:bold;">+ ${formatter.format(neta)}</div>
                </div>`;
                
                gananciasNetasTotal += neta;
                
                // Si el usuario decide sumar las ganancias al capital para el siguiente periodo
                if (reinvGanancias) {
                    capitalInvertido += neta;
                }
            }

            // El total acumulado es igual a todo lo que salió de tu bolsillo + todas las ganancias generadas
            let totalAportes = montoInicial + (extra * numR);
            let totalFinal = totalAportes + gananciasNetasTotal;

            return { totalFinal, gananciasNetasTotal, htmlPeriodos };
        }

        function procesarSimulacion() {
            const nombre = document.getElementById('nombreInv').value || "Simulación " + (db.length + 1);
            const montoInicial = parseInt(document.getElementById('montoInicial').getAttribute('data-value')) || 0;
            const tasaEA = parseFloat(document.getElementById('tasaEA').value) || 0;
            const dias = parseInt(document.getElementById('dias').value) || 0;
            
            if (!montoInicial || !tasaEA || !dias) return alert("Completa los datos principales.");

            const reinv = document.getElementById('chkReinvertir').checked;
            const numR = reinv ? parseInt(document.getElementById('numReinversiones').value) : 0;
            const extra = reinv ? parseInt(document.getElementById('abonoExtra').getAttribute('data-value')) : 0;
            const reinvGanancias = document.getElementById('chkReinvertirGanancias').checked;

            const calc = calcularDatosRender(montoInicial, tasaEA, dias, numR, extra, reinvGanancias);

            const dataSim = {
                nombre, montoInicial, tasaEA, dias, numR, extra, reinvGanancias,
                totalFinal: calc.totalFinal, fecha: new Date().toISOString()
            };

            if (editIndex !== null) {
                db[editIndex] = dataSim;
            } else {
                db.push(dataSim);
            }

            localStorage.setItem('inv_simulations', JSON.stringify(db));
            mostrarResultadoUI(calc);
            resetForm();
            renderHistory();
        }

        function cargarSimulacion(index) {
            editIndex = index;
            const sim = db[index];
            
            document.getElementById('formTitle').innerText = "Editando: " + sim.nombre;
            document.getElementById('formTitle').classList.add('edit-mode-title');
            document.getElementById('btnGuardar').innerText = "Actualizar Inversión";
            document.getElementById('btnGuardar').classList.add('editing');
            document.getElementById('btnCancelar').style.display = 'block';

            document.getElementById('nombreInv').value = sim.nombre;
            const mInput = document.getElementById('montoInicial');
            mInput.setAttribute('data-value', sim.montoInicial);
            mInput.value = formatter.format(sim.montoInicial);
            
            document.getElementById('tasaEA').value = sim.tasaEA;
            document.getElementById('dias').value = sim.dias;
            
            document.getElementById('chkReinvertir').checked = sim.numR > 0;
            document.getElementById('seccionReinversion').classList.toggle('active', sim.numR > 0);
            
            // Compatibilidad con registros antiguos (si reinvGanancias no existe, asume true)
            const aplicaReinvGanancias = sim.reinvGanancias !== false; 
            document.getElementById('chkReinvertirGanancias').checked = aplicaReinvGanancias;

            if(sim.numR > 0) {
                document.getElementById('numReinversiones').value = sim.numR;
                const aInput = document.getElementById('abonoExtra');
                aInput.setAttribute('data-value', sim.extra);
                aInput.value = formatter.format(sim.extra);
            }

            const calc = calcularDatosRender(sim.montoInicial, sim.tasaEA, sim.dias, sim.numR, sim.extra, aplicaReinvGanancias);
            mostrarResultadoUI(calc);
            renderHistory();
        }

        function resetForm() {
            editIndex = null;
            document.getElementById('formTitle').innerText = "Nueva Simulación";
            document.getElementById('formTitle').classList.remove('edit-mode-title');
            document.getElementById('btnGuardar').innerText = "Calcular y Guardar";
            document.getElementById('btnGuardar').classList.remove('editing');
            document.getElementById('btnCancelar').style.display = 'none';
            
            document.getElementById('nombreInv').value = '';
            document.getElementById('montoInicial').setAttribute('data-value', 0);
            document.getElementById('montoInicial').value = formatter.format(0);
            document.getElementById('tasaEA').value = '';
            document.getElementById('dias').value = '';
            document.getElementById('chkReinvertir').checked = false;
            document.getElementById('seccionReinversion').classList.remove('active');
            document.getElementById('chkReinvertirGanancias').checked = true;
            renderHistory();
        }

        function mostrarResultadoUI(calcData) {
            document.getElementById('listaPeriodos').innerHTML = calcData.htmlPeriodos;
            document.getElementById('resGanancias').innerText = formatter.format(calcData.gananciasNetasTotal);
            document.getElementById('resTotal').innerText = formatter.format(calcData.totalFinal);
            document.getElementById('resultados').style.display = 'block';
        }

        function eliminarSimulacion(e, index) {
            e.stopPropagation();
            if(confirm("¿Eliminar esta simulación?")) {
                db.splice(index, 1);
                localStorage.setItem('inv_simulations', JSON.stringify(db));
                if(editIndex === index) resetForm();
                renderHistory();
            }
        }

        renderHistory();
    </script>
</body>
</html>
