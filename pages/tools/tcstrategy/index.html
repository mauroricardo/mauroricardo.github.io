<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planificador Financiero Pro</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --text: #2c3e50;
            --green: #27ae60;
            --red: #c0392b;
            --blue: #3498db;
            --blue-dark: #2980b9;
            --orange: #d35400;
            --purple: #8e44ad;
            --gray: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            color: var(--text);
            max-width: 1150px;
            margin-left: auto;
            margin-right: auto;
            scroll-behavior: smooth;
        }

        /* PANEL CONFIG */
        .config-panel {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: sticky;
            top: 10px;
            z-index: 1000;
        }

        .config-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-item { display: flex; flex-direction: column; }
        
        .config-item label {
            font-size: 0.75rem;
            color: #bdc3c7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .config-item input {
            padding: 8px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            width: 110px;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
        }
        
        .config-select {
            padding: 8px;
            font-size: 0.95rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .panel-divider {
            width: 2px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            margin: 0 5px;
            align-self: center;
        }

        .btn-wrap {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-action:hover { background-color: var(--blue-dark); }

        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-reset:hover { background-color: #c0392b; }

        .flex-row-gap {
            display: flex;
            gap: 5px;
        }

        /* CONTENEDOR MESES */
        .month-container {
            background: #fff;
            border: 1px solid #dfe6e9;
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            scroll-margin-top: 100px;
        }

        .month-header {
            background-color: #ecf0f1;
            padding: 10px 20px;
            font-weight: 900;
            color: var(--text);
            border-bottom: 1px solid #bdc3c7;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .quincenas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .q-card {
            padding: 15px 20px;
            border-right: 1px dashed #bdc3c7;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .q-card:last-child { border-right: none; }

        .q-card-alert {
            background-color: rgba(231, 76, 60, 0.06) !important;
            box-shadow: inset 0 0 0 3px rgba(231, 76, 60, 0.5) !important;
        }

        .q-title {
            font-weight: bold;
            color: #34495e;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .date-range {
            font-size: 1.6rem;
            color: var(--blue);
            font-weight: 900;
            margin-left: 10px;
        }

        .section {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .sec-cash { background-color: #eafaf1; border-left: 4px solid var(--green); }
        .sec-card { background-color: #ebf5fb; border-left: 4px solid var(--blue); }
        .sec-bill { background-color: #f4ecf7; border-left: 4px solid var(--purple); margin-top: 15px; border: 1px solid #e8daef; }

        .q-card-alert .sec-cash, .q-card-alert .sec-card { background-color: rgba(255,255,255,0.5); }

        .lbl-sec {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 900;
            display: block;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        /* Envoltorio para input + botón replicar */
        .input-wrap {
            display: flex;
            align-items: stretch;
            height: 32px;
            background: #fff;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            overflow: hidden;
            transition: all 0.2s;
        }
        .input-wrap:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        input.val {
            width: 80px;
            padding: 5px 6px;
            border: none;
            text-align: right;
            font-family: monospace;
            font-size: 0.95rem;
            outline: none;
        }

        .btn-repl {
            background: #ecf0f1;
            border: none;
            border-left: 1px solid #bdc3c7;
            width: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: var(--gray);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .btn-repl:hover {
            background: var(--blue);
            color: white;
        }

        .txt-gr { color: var(--green); }
        .txt-rd { color: var(--red); }
        .txt-bl { color: var(--blue-dark); }
        .txt-or { color: var(--orange); }
        .txt-pr { color: var(--purple); }
        .bold { font-weight: bold; }

        .res-row {
            border-top: 1px solid rgba(0,0,0,0.1);
            margin-top: 10px;
            padding-top: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 1.05rem;
        }

        .badge {
            font-size: 0.65rem;
            padding: 3px 6px;
            border-radius: 4px;
            color: white;
            background: #95a5a6;
            text-transform: uppercase;
        }
        .bg-pay { background: var(--orange); }

        .quota-row {
            background: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
            color: #34495e;
            border: 1px solid #bdc3c7;
            display: flex; 
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .month-footer {
            background-color: var(--blue);
            color: white;
            padding: 12px 25px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
            border-top: 3px solid var(--blue-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .month-footer span {
            font-size: 1.3rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 4px;
        }

        /* PANELES DE RESUMEN */
        .summary-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .summary-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #dfe6e9;
            display: flex;
            flex-direction: column;
        }

        .p-orange { border-left: 5px solid var(--orange); }
        .p-red { border-left: 5px solid var(--red); }
        .p-green { border-left: 5px solid var(--green); }

        .summary-title {
            font-size: 1.1rem;
            color: #34495e;
            font-weight: 900;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .summary-item {
            background: #fdfefe;
            border: 1px solid #ecf0f1;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            font-weight: bold;
            color: var(--text);
            font-size: 0.9rem;
            text-align: center;
            gap: 5px;
        }
        .summary-item.clickable { cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .summary-item.clickable:hover { transform: translateY(-2px); background: #f4f7f6; border-color: #bdc3c7; }
        .summary-item.alert-hover:hover { border-color: var(--red); }
        .summary-item.green-hover:hover { border-color: var(--green); }
        
        .summary-item span.val { color: var(--orange); font-size: 1rem; }
        .summary-item span.val-green { color: var(--green); font-size: 1rem; }
        .summary-item span.alert-tag { color: var(--red); font-size: 0.8rem; }

        .summary-total {
            margin-top: auto;
            padding-top: 15px;
            border-top: 2px dashed #bdc3c7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .summary-total span.val { color: var(--red); background: #fdedec; padding: 2px 10px; border-radius: 4px; }
        .summary-total span.val-green { color: var(--green); background: #eafaf1; padding: 2px 10px; border-radius: 4px; }
        
        .empty-state { color: var(--gray); font-weight: bold; font-size: 0.95rem; padding: 10px 0; }
        .empty-state.success { color: var(--green); }

        /* ================= MOBILE OPTIMIZATION ================= */
        @media (max-width: 850px) {
            body { padding: 10px; }
            .config-panel {
                position: relative; /* Quita el sticky en móvil para no tapar pantalla */
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                gap: 15px;
            }
            .config-inputs { flex-direction: column; align-items: stretch; gap: 10px; }
            .config-item { width: 100%; margin-bottom: 5px; }
            .config-item input, .config-item select { width: 100% !important; }
            .flex-row-gap { display: flex; width: 100%; }
            .flex-row-gap > * { flex: 1; }
            .panel-divider { display: none; }
            .btn-wrap { justify-content: space-between; width: 100%; gap: 5px; }
            .btn-wrap button { flex: 1; padding: 10px 5px; height: auto; font-size: 0.8rem; }
            
            .quincenas-grid { grid-template-columns: 1fr; }
            .q-card { border-right: none; border-bottom: 2px dashed #bdc3c7; }
            .q-card:last-child { border-bottom: none; }
            
            .input-wrap { width: 130px; }
            input.val { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="config-panel">
        <div class="config-inputs">
            <div class="config-item">
                <label>Año</label>
                <div class="flex-row-gap">
                    <select id="selectYear" class="config-select" style="width: 80px;" onchange="switchContext()"></select>
                    <button class="btn-action" style="padding: 0 10px;" onclick="addNewYear()">+ Año</button>
                </div>
            </div>
            <div class="config-item">
                <label>Versión Activa</label>
                <div class="flex-row-gap">
                    <select id="selectVersion" class="config-select" style="width: 120px;" onchange="switchContext()"></select>
                    <button class="btn-action" style="padding: 0 10px;" onclick="addNewVersion()">+ Versión</button>
                    <button class="btn-action" style="padding: 0 10px; background-color: var(--purple);" onclick="copyFromVersion()" title="Reemplazar esta versión con datos de otra">Copiar de...</button>
                </div>
            </div>
            
            <div class="panel-divider"></div>

            <div class="config-item">
                <label>Cupo Tarjeta Global</label>
                <input type="text" inputmode="numeric" id="globalQuota" value="5.000.000" oninput="globalConfigInput(event)" onfocus="this.select()">
            </div>
            <div class="config-item">
                <label>Factura (Mes 1)</label>
                <input type="text" inputmode="numeric" id="initialBill" value="0" style="color:var(--purple)" oninput="globalConfigInput(event)" onfocus="this.select()">
            </div>
            
            <div class="panel-divider"></div>

            <div class="config-item">
                <label>Gasto Libre Recurrente</label>
                <input type="text" inputmode="numeric" id="globalExpFree" value="0" oninput="formatMoneyRealTime(event)" onfocus="this.select()">
            </div>
            <div class="config-item">
                <label>Mes de Inicio</label>
                <select id="globalExpFreeStart" class="config-select">
                    <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option><option value="4">Abril</option>
                    <option value="5">Mayo</option><option value="6">Junio</option><option value="7">Julio</option><option value="8">Agosto</option>
                    <option value="9">Septiembre</option><option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                </select>
            </div>
            <div class="config-item">
                <label>Frecuencia</label>
                <select id="globalExpFreePeriod" class="config-select">
                    <option value="1">Mensual</option><option value="2">Bimensual</option><option value="3">Trimestral</option>
                    <option value="4">Cuatrimestral</option><option value="6">Semestral</option>
                </select>
            </div>
            <button class="btn-action" style="background-color: var(--orange);" onclick="applyGlobalExpFree()">Aplicar</button>
        </div>

        <div class="btn-wrap">
            <button class="btn-action" onclick="exportData()">Exportar</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn-action" onclick="document.getElementById('importFile').click()">Importar</button>
            <button class="btn-reset" onclick="resetData()">Limpiar Vista</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="summary-container">
        <div id="summary-exp-free" class="summary-panel p-orange"></div>
        <div id="summary-sav-ext" class="summary-panel p-green"></div>
        <div id="summary-desfase" class="summary-panel p-red"></div>
    </div>

    <script>
        const months = 12;
        const qPerMonth = 2;
        const container = document.getElementById('app');
        const summaryExpContainer = document.getElementById('summary-exp-free');
        const summarySavExtContainer = document.getElementById('summary-sav-ext');
        const summaryDesfaseContainer = document.getElementById('summary-desfase');
        
        const monthNames = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];
        
        const fmtInput = (n) => new Intl.NumberFormat('es-CO').format(n);
        const fmt = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);

        function cleanNum(str) {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const num = parseFloat(str.toString().replace(/[^0-9-]/g, ''));
            return isNaN(num) ? 0 : num;
        }

        const defaultData = Array(months * qPerMonth).fill(null).map((_, index) => {
            const isQ1 = (index % 2 === 0);
            return { inc: isQ1 ? 3000000 : 0, sav: isQ1 ? 500 : 0, sav_ext: 0, exp_tc: 0, exp_free: 0, pay: 0, spend: 0, billGenerated: 0 };
        });

        // Estructura Maestra
        let masterStore = {
            years: {},
            activeYear: new Date().getFullYear().toString(),
            activeVersion: "Principal"
        };
        
        let dataStore = [];

        // --- MÁSCARA DE DINERO EN TIEMPO REAL ---
        function formatMoneyRealTime(e) {
            let input = e.target;
            let originalLen = input.value.length;
            let cursorPosition = input.selectionStart;
            
            let rawStr = input.value.replace(/[^0-9-]/g, '');
            let rawNum = 0;
            
            if (rawStr === '') {
                input.value = '';
            } else {
                rawNum = parseInt(rawStr, 10);
                input.value = fmtInput(rawNum);
            }

            let newLen = input.value.length;
            cursorPosition += (newLen - originalLen);
            input.setSelectionRange(cursorPosition, cursorPosition);
            
            return rawNum;
        }

        function globalConfigInput(e) {
            formatMoneyRealTime(e);
            recalculate();
        }

        function updateData(e) {
            let rawNum = formatMoneyRealTime(e);
            let input = e.target;
            
            const idx = parseInt(input.getAttribute('data-i'));
            if(input.classList.contains('inp-inc')) dataStore[idx].inc = rawNum;
            if(input.classList.contains('inp-sav')) dataStore[idx].sav = rawNum;
            if(input.classList.contains('inp-sav-ext')) dataStore[idx].sav_ext = rawNum;
            if(input.classList.contains('inp-exp-tc')) dataStore[idx].exp_tc = rawNum;
            if(input.classList.contains('inp-exp-free')) dataStore[idx].exp_free = rawNum;
            if(input.classList.contains('inp-pay')) dataStore[idx].pay = rawNum;
            if(input.classList.contains('inp-spend')) dataStore[idx].spend = rawNum;
            recalculate();
        }

        // --- NUEVA FUNCIÓN: REPLICAR HACIA ADELANTE ---
        function replicate(sourceIdx, inputClass, dataKey) {
            const val = dataStore[sourceIdx][dataKey];
            const isQ1 = (sourceIdx % 2 === 0);
            const qStr = isQ1 ? "Quincena 1" : "Quincena 2";
            
            if(!confirm(`¿Replicar el valor de ${fmt(val)} en la ${qStr} de todos los meses siguientes del año?`)) return;

            // Recorre saltando de a 2 para afectar solo a la misma quincena
            for (let i = sourceIdx + 2; i < dataStore.length; i += 2) {
                dataStore[i][dataKey] = val;
                const el = document.querySelector(`.${inputClass}[data-i="${i}"]`);
                if (el) el.value = fmtInput(val);
            }
            recalculate();
        }

        function initYearStructure(year) {
            if (!masterStore.years[year]) masterStore.years[year] = {};
            if (!masterStore.years[year]["Principal"]) {
                masterStore.years[year]["Principal"] = {
                    quota: 5000000,
                    initialBill: 0,
                    data: JSON.parse(JSON.stringify(defaultData))
                };
            }
        }

        function loadData() {
            const savedMaster = localStorage.getItem('finanzas_master_v5');
            
            if (savedMaster) {
                masterStore = JSON.parse(savedMaster);
            } else {
                const currentYear = new Date().getFullYear().toString();
                initYearStructure(currentYear);
                masterStore.activeYear = currentYear;
                
                const oldData = localStorage.getItem('finanzas_data_v4');
                const oldQuota = localStorage.getItem('finanzas_quota_v4');
                const oldBill = localStorage.getItem('finanzas_bill_v4');
                
                if (oldData) {
                    masterStore.years[currentYear]["Principal"].data = JSON.parse(oldData);
                    if(oldQuota) masterStore.years[currentYear]["Principal"].quota = cleanNum(oldQuota);
                    if(oldBill) masterStore.years[currentYear]["Principal"].initialBill = cleanNum(oldBill);
                }
            }

            if (!masterStore.years[masterStore.activeYear]) {
                masterStore.activeYear = Object.keys(masterStore.years)[0] || new Date().getFullYear().toString();
                initYearStructure(masterStore.activeYear);
            }
            if (!masterStore.years[masterStore.activeYear][masterStore.activeVersion]) {
                masterStore.activeVersion = Object.keys(masterStore.years[masterStore.activeYear])[0] || "Principal";
            }

            dataStore = masterStore.years[masterStore.activeYear][masterStore.activeVersion].data;
            document.getElementById('globalQuota').value = fmtInput(masterStore.years[masterStore.activeYear][masterStore.activeVersion].quota);
            document.getElementById('initialBill').value = fmtInput(masterStore.years[masterStore.activeYear][masterStore.activeVersion].initialBill);

            const savedGlobalExp = localStorage.getItem('finanzas_global_exp');
            const savedGlobalPer = localStorage.getItem('finanzas_global_per');
            const savedGlobalStart = localStorage.getItem('finanzas_global_start');
            if (savedGlobalExp) document.getElementById('globalExpFree').value = fmtInput(savedGlobalExp);
            if (savedGlobalPer) document.getElementById('globalExpFreePeriod').value = savedGlobalPer;
            if (savedGlobalStart) document.getElementById('globalExpFreeStart').value = savedGlobalStart;
            
            updateSelectors();
        }

        function updateSelectors() {
            const selectYear = document.getElementById('selectYear');
            const selectVersion = document.getElementById('selectVersion');
            
            selectYear.innerHTML = '';
            Object.keys(masterStore.years).sort().forEach(year => {
                const opt = document.createElement('option');
                opt.value = year; opt.textContent = year;
                if (year === masterStore.activeYear) opt.selected = true;
                selectYear.appendChild(opt);
            });

            selectVersion.innerHTML = '';
            Object.keys(masterStore.years[masterStore.activeYear]).forEach(version => {
                const opt = document.createElement('option');
                opt.value = version; opt.textContent = version;
                if (version === masterStore.activeVersion) opt.selected = true;
                selectVersion.appendChild(opt);
            });
        }

        function softReload() {
            dataStore = masterStore.years[masterStore.activeYear][masterStore.activeVersion].data;
            document.getElementById('globalQuota').value = fmtInput(masterStore.years[masterStore.activeYear][masterStore.activeVersion].quota);
            document.getElementById('initialBill').value = fmtInput(masterStore.years[masterStore.activeYear][masterStore.activeVersion].initialBill);
            updateSelectors();
            init();
            recalculate();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchContext() {
            saveData(); 
            const newYear = document.getElementById('selectYear').value;
            const newVersion = document.getElementById('selectVersion').value;
            
            masterStore.activeYear = newYear;
            
            if (!masterStore.years[newYear][newVersion]) {
                masterStore.activeVersion = Object.keys(masterStore.years[newYear])[0];
            } else {
                masterStore.activeVersion = newVersion;
            }
            
            localStorage.setItem('finanzas_master_v5', JSON.stringify(masterStore));
            softReload(); 
        }

        function addNewYear() {
            saveData();
            const yearsArr = Object.keys(masterStore.years).map(Number);
            const nextYear = (Math.max(...yearsArr) + 1).toString();
            initYearStructure(nextYear);
            masterStore.activeYear = nextYear;
            masterStore.activeVersion = "Principal";
            localStorage.setItem('finanzas_master_v5', JSON.stringify(masterStore));
            softReload();
        }

        function addNewVersion() {
            saveData();
            const name = prompt("Escribe el nombre de la nueva versión (Ej: Escenario B, Optimista, etc.):");
            if (name && name.trim() !== "") {
                if (masterStore.years[masterStore.activeYear][name]) {
                    alert("Ya existe una versión con ese nombre en este año.");
                    return;
                }
                const currentData = masterStore.years[masterStore.activeYear][masterStore.activeVersion];
                masterStore.years[masterStore.activeYear][name] = JSON.parse(JSON.stringify(currentData));
                masterStore.activeVersion = name;
                localStorage.setItem('finanzas_master_v5', JSON.stringify(masterStore));
                softReload();
            }
        }

        // --- NUEVO: FUNCIÓN PARA COPIAR DESDE OTRA VERSIÓN ---
        function copyFromVersion() {
            const versions = Object.keys(masterStore.years[masterStore.activeYear]).filter(v => v !== masterStore.activeVersion);
            if (versions.length === 0) {
                alert("No hay otras versiones en este año de las cuales copiar.");
                return;
            }
            const name = prompt("VERSIONS DISPONIBLES:\n- " + versions.join('\n- ') + "\n\nEscribe el nombre de la versión que quieres copiar para REEMPLAZAR la actual:");
            
            if (name && masterStore.years[masterStore.activeYear][name]) {
                if (confirm(`⚠️ CUIDADO: Vas a sobrescribir la versión actual ("${masterStore.activeVersion}") con todos los datos de "${name}".\n\n¿Estás completamente seguro?`)) {
                    const sourceData = masterStore.years[masterStore.activeYear][name];
                    masterStore.years[masterStore.activeYear][masterStore.activeVersion] = JSON.parse(JSON.stringify(sourceData));
                    saveData();
                    softReload();
                    alert("¡Versión copiada exitosamente!");
                }
            } else if (name) {
                alert("No se encontró ninguna versión con ese nombre exacto.");
            }
        }

        function saveData() {
            masterStore.years[masterStore.activeYear][masterStore.activeVersion].quota = cleanNum(document.getElementById('globalQuota').value);
            masterStore.years[masterStore.activeYear][masterStore.activeVersion].initialBill = cleanNum(document.getElementById('initialBill').value);
            masterStore.years[masterStore.activeYear][masterStore.activeVersion].data = dataStore;

            localStorage.setItem('finanzas_master_v5', JSON.stringify(masterStore));
            
            localStorage.setItem('finanzas_global_exp', cleanNum(document.getElementById('globalExpFree').value));
            localStorage.setItem('finanzas_global_per', document.getElementById('globalExpFreePeriod').value);
            localStorage.setItem('finanzas_global_start', document.getElementById('globalExpFreeStart').value);
        }

        function resetData() {
            if (confirm(`¿Estás seguro de borrar toda la información de la versión [${masterStore.activeVersion}] del año [${masterStore.activeYear}]?`)) {
                dataStore = JSON.parse(JSON.stringify(defaultData));
                masterStore.years[masterStore.activeYear][masterStore.activeVersion].data = dataStore;
                masterStore.years[masterStore.activeYear][masterStore.activeVersion].quota = 5000000;
                masterStore.years[masterStore.activeYear][masterStore.activeVersion].initialBill = 0;
                
                document.getElementById('globalQuota').value = fmtInput(5000000);
                document.getElementById('initialBill').value = "0";

                saveData();
                softReload();
            }
        }

        function applyGlobalExpFree() {
            const val = cleanNum(document.getElementById('globalExpFree').value);
            const period = parseInt(document.getElementById('globalExpFreePeriod').value); 
            const startMonth = parseInt(document.getElementById('globalExpFreeStart').value); 
            for (let i = 0; i < dataStore.length; i++) {
                dataStore[i].exp_free = 0;
                const inputEl = document.querySelector(`.inp-exp-free[data-i="${i}"]`);
                if(inputEl) inputEl.value = fmtInput(0);
            }
            for (let i = 0; i < dataStore.length; i++) {
                const isQ1 = (i % 2 === 0);
                if (isQ1) {
                    const monthNum = Math.floor(i / 2) + 1; 
                    let shouldApply = false;
                    if (monthNum >= startMonth) {
                        if ((monthNum - startMonth) % period === 0) {
                            shouldApply = true;
                        }
                    }
                    if (shouldApply) {
                        dataStore[i].exp_free = val;
                        const inputEl = document.querySelector(`.inp-exp-free[data-i="${i}"]`);
                        if(inputEl) inputEl.value = fmtInput(val);
                    }
                }
            }
            recalculate();
            alert("Gastos libres aplicados correctamente en la versión actual.");
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(masterStore));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = `finanzas_backup_${masterStore.activeYear}.json`;
            a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imp = JSON.parse(e.target.result);
                    if (imp.years && imp.activeYear) { 
                        localStorage.setItem('finanzas_master_v5', JSON.stringify(imp));
                        location.reload(); 
                    } else {
                        alert("El archivo no es compatible con el sistema de multiversión.");
                    }
                } catch (err) {
                    alert("El archivo no es válido o está corrupto.");
                }
            };
            reader.readAsText(event.target.files[0]);
        }

        function init() {
            container.innerHTML = '';
            let idx = 0;
            for (let m = 1; m <= months; m++) {
                const mDiv = document.createElement('div');
                mDiv.className = 'month-container';
                mDiv.id = `month-section-${m}`;
                mDiv.innerHTML = `<div class="month-header">${monthNames[m-1]}</div>`;
                const grid = document.createElement('div');
                grid.className = 'quincenas-grid';

                for (let q = 1; q <= qPerMonth; q++) {
                    const isQ1 = (q === 1);
                    const d = dataStore[idx]; 
                    
                    const dateRange = isQ1 ? '1 - 15' : '16 - 30';

                    const cell = document.createElement('div');
                    cell.className = 'q-card';
                    cell.id = `q-card-${idx}`; 
                    
                    cell.innerHTML = `
                        <div class="q-title">
                            <span style="display:flex; align-items:center;">
                                Quincena ${q} 
                                <span class="date-range">${dateRange}</span>
                            </span>
                            ${isQ1 
                                ? '<span class="badge bg-pay">Pago Día 2</span>' 
                                : '<span class="badge">Abono Voluntario</span>'}
                        </div>

                        <div class="section sec-cash">
                            <span class="lbl-sec txt-gr">Caja (Efectivo)</span>
                            <div class="row"><label>Anterior:</label><strong id="cash-prev-${idx}">$0</strong></div>
                            
                            ${isQ1 ? `
                            <div class="row">
                                <label class="txt-gr">+ Ingresos:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-inc" data-i="${idx}" value="${fmtInput(d.inc)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-inc', 'inc')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>
                            <div class="row">
                                <label class="txt-gr">+ Ahorros:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-sav" data-i="${idx}" value="${fmtInput(d.sav)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-sav', 'sav')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>
                            <div class="row">
                                <label class="txt-gr">+ Ahorro extra:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-sav-ext" data-i="${idx}" value="${fmtInput(d.sav_ext)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-sav-ext', 'sav_ext')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>
                            ` : ''}
                            
                            <div class="row" style="border-bottom: 1px solid #a3e4d7; padding-bottom: 8px; margin-top: 6px; margin-bottom: 10px;">
                                <label style="color:var(--green); font-weight:bold; font-size:0.85rem;">= Total Inicial:</label>
                                <span id="cash-subtotal-${idx}" style="color:var(--green); font-weight:bold;">$0</span>
                            </div>
                            
                            <div class="row">
                                <label class="txt-rd">- Gastos est. TC:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-exp-tc" data-i="${idx}" value="${fmtInput(d.exp_tc)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-exp-tc', 'exp_tc')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>
                            <div class="row">
                                <label class="txt-rd">- Gastos libres:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-exp-free" data-i="${idx}" value="${fmtInput(d.exp_free)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-exp-free', 'exp_free')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>
                            
                            <div class="row" style="font-size:0.8rem; color:var(--orange);">
                                <label>- Salida Pago TC:</label><span id="val-pay-note-${idx}">$0</span>
                            </div>

                            <div class="res-row txt-gr">
                                <span>Disponible:</span><span id="cash-final-${idx}">$0</span>
                            </div>
                        </div>

                        <div class="section sec-card">
                            <span class="lbl-sec txt-bl">Tarjeta de Crédito</span>
                            <div class="row"><label>Deuda Total Ant.:</label><strong id="debt-prev-${idx}">$0</strong></div>
                            
                            <div class="row">
                                <label class="txt-or bold">${isQ1 ? 'Pago (Día 2):' : 'Abono Q2:'}</label>
                                <div class="input-wrap" style="border-color: var(--orange);">
                                    <input type="text" inputmode="numeric" class="val inp-pay" data-i="${idx}" value="${fmtInput(d.pay)}" style="color:var(--orange); font-weight:bold;">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-pay', 'pay')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>

                            <div class="row">
                                <label class="txt-bl">+ Compras Nuevas:</label>
                                <div class="input-wrap">
                                    <input type="text" inputmode="numeric" class="val inp-spend" data-i="${idx}" value="${fmtInput(d.spend)}">
                                    <button class="btn-repl" onclick="replicate(${idx}, 'inp-spend', 'spend')" title="Replicar hacia adelante">↓</button>
                                </div>
                            </div>

                            <div class="res-row txt-bl">
                                <span>Deuda Total:</span><span id="debt-final-${idx}">$0</span>
                            </div>
                            
                            <div class="quota-row">
                                <label>Cupo Disponible:</label>
                                <span id="quota-final-${idx}">$0</span>
                            </div>
                        </div>

                        ${isQ1 ? `
                        <div class="section sec-bill">
                            <span class="lbl-sec txt-pr">Factura (Vence Día 2)</span>
                            
                            <div style="background:#fff; padding:8px; border:1px dashed var(--purple); border-radius:4px; margin-bottom:10px;">
                                <div class="row"><label>Facturado Total:</label><span id="bill-original-${idx}">$0</span></div>
                                <div class="row" style="color:#666; font-size:0.85rem; border-bottom:1px solid #eee; padding-bottom:5px;"><label>(-) Abonos Q2:</label><span id="bill-deduct-q2-${idx}">$0</span></div>
                                <div class="row bold txt-or" style="margin-top:5px;"><label>Pendiente Real:</label><span id="bill-pending-${idx}">$0</span></div>
                            </div>

                            <div class="row" style="font-size:0.85rem; margin-bottom:10px;">
                                <label>Estado:</label>
                                <span id="bill-status-${idx}">---</span>
                            </div>

                            <hr style="border:0; border-top:1px dashed #ccc;">

                            <div class="row bold txt-pr">
                                <label>Nuevo Corte (Día 15):</label>
                                <span id="bill-new-${idx}">$0</span>
                            </div>
                        </div>
                        ` : ''}
                    `;
                    grid.appendChild(cell);
                    idx++;
                }
                
                mDiv.appendChild(grid);
                
                const footer = document.createElement('div');
                footer.className = 'month-footer';
                footer.innerHTML = `
                    <label style="font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; opacity:0.9;">Total Gastos Mes (Efectivo + Tarjeta)</label>
                    <span id="month-total-expenses-${m}">$0</span>
                `;
                mDiv.appendChild(footer);

                container.appendChild(mDiv);
            }

            document.querySelectorAll('input.val').forEach(inp => {
                inp.addEventListener('input', updateData);
                inp.addEventListener('focus', function() { this.select(); });
            });
        }

        function scrollToMonth(mNum) {
            const el = document.getElementById(`month-section-${mNum}`);
            if(el) {
                el.scrollIntoView({ behavior: 'smooth' });
                el.style.transition = "box-shadow 0.5s";
                el.style.boxShadow = "0 0 15px rgba(52, 152, 219, 0.8)";
                setTimeout(() => el.style.boxShadow = "0 2px 5px rgba(0,0,0,0.05)", 1000);
            }
        }

        function recalculate() {
            const globalQuota = cleanNum(document.getElementById('globalQuota').value);
            let initialBill = cleanNum(document.getElementById('initialBill').value);
            
            let cash = 0;
            let totalDebt = initialBill; 
            let prevQ2Spend = 0; 
            let currentMonthExpenses = 0; 
            
            let expFreeHTML = '', savExtHTML = '', globalExpFreeTotal = 0, globalSavExtTotal = 0;
            let desfaseMonths = new Set();

            for (let i = 0; i < dataStore.length; i++) {
                const d = dataStore[i], isQ1 = (i % 2 === 0), mNum = Math.floor(i / 2) + 1;
                let hasAlert = false;

                currentMonthExpenses += (d.exp_tc || 0) + (d.exp_free || 0) + (d.spend || 0);

                document.getElementById(`cash-prev-${i}`).innerText = fmt(cash);
                document.getElementById(`debt-prev-${i}`).innerText = fmt(totalDebt);
                document.getElementById(`val-pay-note-${i}`).innerText = `-${fmt(d.pay)}`;

                let subtotalCash = cash + (d.inc || 0) + (d.sav || 0) + (d.sav_ext || 0);
                document.getElementById(`cash-subtotal-${i}`).innerText = fmt(subtotalCash);

                cash = subtotalCash - (d.exp_tc || 0) - (d.exp_free || 0) - (d.pay || 0);
                
                if (cash < 0) hasAlert = true;

                const elCash = document.getElementById(`cash-final-${i}`);
                elCash.innerText = fmt(cash);
                elCash.className = cash < 0 ? 'res-row txt-rd' : 'res-row txt-gr';

                totalDebt = totalDebt + (d.spend || 0) - (d.pay || 0);
                document.getElementById(`debt-final-${i}`).innerText = fmt(totalDebt);

                const quotaLeft = globalQuota - totalDebt;
                const elQuota = document.getElementById(`quota-final-${i}`);
                elQuota.innerText = fmt(quotaLeft);
                
                if(quotaLeft < 0) { elQuota.style.color = "var(--red)"; hasAlert = true; }
                else if (quotaLeft < globalQuota * 0.1) elQuota.style.color = "var(--orange)";
                else elQuota.style.color = "var(--green)";

                if (isQ1) {
                    let billOriginal = (i === 0) ? initialBill : (i > 0 ? dataStore[i-1].billGenerated : 0);
                    let paymentsInQ2 = (i > 0) ? dataStore[i-1].pay : 0;
                    let billPendingReal = Math.max(0, billOriginal - paymentsInQ2);

                    document.getElementById(`bill-original-${i}`).innerText = fmt(billOriginal);
                    document.getElementById(`bill-deduct-q2-${i}`).innerText = `-${fmt(paymentsInQ2)}`;
                    document.getElementById(`bill-pending-${i}`).innerText = fmt(billPendingReal);

                    const statusEl = document.getElementById(`bill-status-${i}`);
                    const remainingAfterToday = billPendingReal - (d.pay || 0);

                    if (remainingAfterToday <= 0) {
                        statusEl.innerText = "Cubierto"; statusEl.style.color = "var(--green)";
                    } else {
                        statusEl.innerText = `Falta: ${fmt(remainingAfterToday)}`; statusEl.style.color = "var(--red)"; hasAlert = true; 
                    }

                    let newBill = prevQ2Spend + (d.spend || 0) + remainingAfterToday;
                    document.getElementById(`bill-new-${i}`).innerText = fmt(newBill);
                    d.billGenerated = newBill; prevQ2Spend = 0; 
                } else {
                    prevQ2Spend = (d.spend || 0); d.billGenerated = dataStore[i-1].billGenerated; 
                    
                    let mTotalFree = (dataStore[i-1].exp_free || 0) + (d.exp_free || 0);
                    if (mTotalFree > 0) { 
                        expFreeHTML += `<li class="summary-item clickable" onclick="scrollToMonth(${mNum})">${monthNames[mNum-1]} <span><span class="val">${fmt(mTotalFree)}</span></span></li>`; 
                        globalExpFreeTotal += mTotalFree; 
                    }
                    
                    let mTotalSavExt = (dataStore[i-1].sav_ext || 0) + (d.sav_ext || 0);
                    if (mTotalSavExt > 0) { 
                        savExtHTML += `<li class="summary-item clickable green-hover" onclick="scrollToMonth(${mNum})">${monthNames[mNum-1]} <span class="val-green">${fmt(mTotalSavExt)}</span></li>`; 
                        globalSavExtTotal += mTotalSavExt; 
                    }

                    document.getElementById(`month-total-expenses-${mNum}`).innerText = fmt(currentMonthExpenses); currentMonthExpenses = 0; 
                }

                if (hasAlert) desfaseMonths.add(mNum);
                const cardEl = document.getElementById(`q-card-${i}`);
                if (hasAlert) cardEl.classList.add('q-card-alert');
                else cardEl.classList.remove('q-card-alert');
            }

            if (globalExpFreeTotal > 0) {
                summaryExpContainer.innerHTML = `<div class="summary-title">Gastos Libres</div><ul class="summary-list">${expFreeHTML}</ul><div class="summary-total" style="margin-top:auto">Total Anual: <span class="val">${fmt(globalExpFreeTotal)}</span></div>`;
            } else {
                summaryExpContainer.innerHTML = `<div class="summary-title">Gastos Libres</div><div class="empty-state">Sin gastos libres programados.</div>`;
            }

            if (globalSavExtTotal > 0) {
                summarySavExtContainer.innerHTML = `<div class="summary-title">Ahorros Extras</div><ul class="summary-list">${savExtHTML}</ul><div class="summary-total" style="margin-top:auto">Total Anual: <span class="val-green">${fmt(globalSavExtTotal)}</span></div>`;
            } else {
                summarySavExtContainer.innerHTML = `<div class="summary-title">Ahorros Extras</div><div class="empty-state">Sin ahorros extras programados.</div>`;
            }

            if (desfaseMonths.size > 0) {
                let listHTML = '';
                Array.from(desfaseMonths).sort((a,b)=>a-b).forEach(m => {
                    listHTML += `<li class="summary-item clickable alert-hover" onclick="scrollToMonth(${m})">${monthNames[m-1]} <span class="alert-tag">Revisar ↓</span></li>`;
                });
                summaryDesfaseContainer.innerHTML = `<div class="summary-title">Meses con Desfase</div><ul class="summary-list">${listHTML}</ul>`;
            } else {
                summaryDesfaseContainer.innerHTML = `<div class="summary-title">Meses con Desfase</div><div class="empty-state success">🎉 Todo en orden, sin desfases.</div>`;
            }

            saveData();
        }

        loadData(); 
        init(); 
        recalculate();

        setTimeout(() => {
            const now = new Date();
            if (masterStore.activeYear === now.getFullYear().toString()) {
                scrollToMonth(now.getMonth() + 1);
            }
        }, 500);

    </script>
</body>
</html>
