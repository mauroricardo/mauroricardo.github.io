<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Financiero Pro</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --text: #2c3e50;
            --green: #27ae60;
            --red: #c0392b;
            --blue: #3498db;
            --blue-dark: #2980b9;
            --orange: #d35400;
            --purple: #8e44ad;
            --gray: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            max-width: 1150px;
            margin-left: auto;
            margin-right: auto;
        }

        /* PANEL CONFIG */
        .config-panel {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .config-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-item { display: flex; flex-direction: column; }
        
        .config-item label {
            font-size: 0.75rem;
            color: #bdc3c7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .config-item input {
            padding: 8px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            width: 110px;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
        }
        
        .config-select {
            padding: 8px;
            font-size: 0.95rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* DIVISOR EN EL PANEL */
        .panel-divider {
            width: 2px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            margin: 0 5px;
            align-self: center;
        }

        .btn-wrap {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-action:hover { background-color: var(--blue-dark); }

        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-reset:hover { background-color: #c0392b; }

        /* CONTENEDOR MESES */
        .month-container {
            background: #fff;
            border: 1px solid #dfe6e9;
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .month-header {
            background-color: #ecf0f1;
            padding: 10px 20px;
            font-weight: 900;
            color: var(--text);
            border-bottom: 1px solid #bdc3c7;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .quincenas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 950px) {
            .quincenas-grid { grid-template-columns: 1fr; }
            .quincenas-grid > div:first-child { border-bottom: 1px dashed #ccc; }
            .panel-divider { display: none; }
        }

        .q-card {
            padding: 15px 20px;
            border-right: 1px dashed #bdc3c7;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .q-card:last-child { border-right: none; }

        /* ALERTA DE QUINCENA NEGATIVA */
        .q-card-alert {
            background-color: rgba(231, 76, 60, 0.06) !important;
            box-shadow: inset 0 0 0 3px rgba(231, 76, 60, 0.5) !important;
        }

        .q-title {
            font-weight: bold;
            color: #34495e;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .date-range {
            font-size: 1.6rem;
            color: var(--blue);
            font-weight: 900;
            margin-left: 10px;
        }

        /* SECCIONES */
        .section {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .sec-cash { background-color: #eafaf1; border-left: 4px solid var(--green); }
        .sec-card { background-color: #ebf5fb; border-left: 4px solid var(--blue); }
        .sec-bill { background-color: #f4ecf7; border-left: 4px solid var(--purple); margin-top: 15px; border: 1px solid #e8daef; }

        .q-card-alert .sec-cash { background-color: rgba(255,255,255,0.5); }
        .q-card-alert .sec-card { background-color: rgba(255,255,255,0.5); }

        .lbl-sec {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 900;
            display: block;
            margin-bottom: 10px;
        }

        /* FILAS */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        input.val {
            width: 100px;
            padding: 5px 6px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            text-align: right;
            font-family: monospace;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        input.val:focus {
            outline: none;
            border-color: var(--blue);
            background-color: #fdfefe;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        /* TEXTOS */
        .txt-gr { color: var(--green); }
        .txt-rd { color: var(--red); }
        .txt-bl { color: var(--blue-dark); }
        .txt-or { color: var(--orange); }
        .txt-pr { color: var(--purple); }
        .bold { font-weight: bold; }

        .res-row {
            border-top: 1px solid rgba(0,0,0,0.1);
            margin-top: 10px;
            padding-top: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 1.05rem;
        }

        .badge {
            font-size: 0.65rem;
            padding: 3px 6px;
            border-radius: 4px;
            color: white;
            background: #95a5a6;
            text-transform: uppercase;
        }
        .bg-pay { background: var(--orange); }

        .quota-row {
            background: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
            color: #34495e;
            border: 1px solid #bdc3c7;
            display: flex; 
            justify-content: space-between;
            font-size: 0.95rem;
        }

        /* FOOTER DEL MES */
        .month-footer {
            background-color: var(--blue);
            color: white;
            padding: 12px 25px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
            border-top: 3px solid var(--blue-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .month-footer span {
            font-size: 1.3rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 4px;
        }

    </style>
</head>
<body>

    <div class="config-panel">
        <div class="config-inputs">
            <div class="config-item">
                <label>Cupo Tarjeta</label>
                <input type="text" inputmode="numeric" id="globalQuota" value="5.000.000">
            </div>
            <div class="config-item">
                <label>Factura (Mes 1)</label>
                <input type="text" inputmode="numeric" id="initialBill" value="0" style="color:var(--purple)">
            </div>
            
            <div class="panel-divider"></div>

            <div class="config-item">
                <label>Gasto Libre</label>
                <input type="text" inputmode="numeric" id="globalExpFree" value="0" placeholder="Ej: 500000">
            </div>
            <div class="config-item">
                <label>Mes Inicio</label>
                <select id="globalExpFreeStart" class="config-select">
                    <option value="1">Mes 1</option>
                    <option value="2">Mes 2</option>
                    <option value="3">Mes 3</option>
                    <option value="4">Mes 4</option>
                    <option value="5">Mes 5</option>
                    <option value="6">Mes 6</option>
                    <option value="7">Mes 7</option>
                    <option value="8">Mes 8</option>
                    <option value="9">Mes 9</option>
                    <option value="10">Mes 10</option>
                    <option value="11">Mes 11</option>
                    <option value="12">Mes 12</option>
                </select>
            </div>
            <div class="config-item">
                <label>Frecuencia</label>
                <select id="globalExpFreePeriod" class="config-select">
                    <option value="1">Mensual</option>
                    <option value="2">Bimensual</option>
                    <option value="3">Trimestral</option>
                    <option value="4">Cuatrimestral</option>
                    <option value="6">Semestral</option>
                </select>
            </div>
            <button class="btn-action" style="background-color: var(--orange);" onclick="applyGlobalExpFree()">Aplicar</button>
        </div>

        <div class="btn-wrap">
            <button class="btn-action" onclick="exportData()">Exportar JSON</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn-action" onclick="document.getElementById('importFile').click()">Importar</button>
            <button class="btn-reset" onclick="resetData()">Limpiar</button>
        </div>
    </div>

    <div id="app"></div>

    <script>
        const months = 12;
        const qPerMonth = 2;
        const container = document.getElementById('app');
        
        // Formateadores
        const fmt = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
        const fmtInput = (n) => new Intl.NumberFormat('es-CO').format(n);

        function cleanNum(str) {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const num = parseFloat(str.toString().replace(/[^0-9-]/g, ''));
            return isNaN(num) ? 0 : num;
        }

        // --- VALORES POR DEFECTO ---
        const defaultData = Array(months * qPerMonth).fill(null).map((_, index) => {
            const isQ1 = (index % 2 === 0);
            return {
                inc: isQ1 ? 3000000 : 0,
                sav: isQ1 ? 500 : 0,
                exp_tc: 0,
                exp_free: 0,
                pay: 0,
                spend: 0,
                billGenerated: 0
            };
        });

        let dataStore = [];

        // --- LOCAL STORAGE ---
        function loadData() {
            const savedData = localStorage.getItem('finanzas_data_v3');
            const savedQuota = localStorage.getItem('finanzas_quota_v3');
            const savedBill = localStorage.getItem('finanzas_bill_v3');
            
            const savedGlobalExp = localStorage.getItem('finanzas_global_exp');
            const savedGlobalPer = localStorage.getItem('finanzas_global_per');
            const savedGlobalStart = localStorage.getItem('finanzas_global_start');

            if (savedData) {
                let parsed = JSON.parse(savedData);
                dataStore = parsed.map(item => ({
                    ...item,
                    exp_tc: item.exp_tc || 0,
                    exp_free: item.exp_free !== undefined ? item.exp_free : (item.exp || 0)
                }));
            } else {
                dataStore = JSON.parse(JSON.stringify(defaultData)); 
            }

            if (savedQuota) document.getElementById('globalQuota').value = fmtInput(savedQuota);
            if (savedBill) document.getElementById('initialBill').value = fmtInput(savedBill);
            if (savedGlobalExp) document.getElementById('globalExpFree').value = fmtInput(savedGlobalExp);
            if (savedGlobalPer) document.getElementById('globalExpFreePeriod').value = savedGlobalPer;
            if (savedGlobalStart) document.getElementById('globalExpFreeStart').value = savedGlobalStart;
        }

        function saveData() {
            localStorage.setItem('finanzas_data_v3', JSON.stringify(dataStore));
            localStorage.setItem('finanzas_quota_v3', cleanNum(document.getElementById('globalQuota').value));
            localStorage.setItem('finanzas_bill_v3', cleanNum(document.getElementById('initialBill').value));
            localStorage.setItem('finanzas_global_exp', cleanNum(document.getElementById('globalExpFree').value));
            localStorage.setItem('finanzas_global_per', document.getElementById('globalExpFreePeriod').value);
            localStorage.setItem('finanzas_global_start', document.getElementById('globalExpFreeStart').value);
        }

        function resetData() {
            if (confirm("¿Estás seguro de borrar toda tu información? Esto reiniciará la tabla a los valores por defecto.")) {
                localStorage.clear();
                location.reload(); 
            }
        }

        // --- HERRAMIENTA DE APLICACIÓN RECURRENTE ---
        function applyGlobalExpFree() {
            const val = cleanNum(document.getElementById('globalExpFree').value);
            const period = parseInt(document.getElementById('globalExpFreePeriod').value); // 1, 2, 3, 4, 6
            const startMonth = parseInt(document.getElementById('globalExpFreeStart').value); // 1-12
            
            for (let i = 0; i < dataStore.length; i++) {
                const isQ1 = (i % 2 === 0);
                if (isQ1) {
                    const monthNum = Math.floor(i / 2) + 1; // Mes del 1 al 12
                    let shouldApply = false;

                    // La magia matemática: Si el mes actual es mayor o igual al mes de inicio
                    // Y la diferencia entre el mes actual y el mes de inicio es múltiplo del periodo
                    if (monthNum >= startMonth) {
                        if ((monthNum - startMonth) % period === 0) {
                            shouldApply = true;
                        }
                    }

                    if (shouldApply) {
                        dataStore[i].exp_free = val;
                        const inputEl = document.querySelector(`.inp-exp-free[data-i="${i}"]`);
                        if(inputEl) inputEl.value = fmtInput(val);
                    }
                }
            }
            recalculate();
        }

        // --- IMPORT/EXPORT ---
        function exportData() {
            const exportObj = {
                dataStore: dataStore,
                quota: cleanNum(document.getElementById('globalQuota').value),
                initialBill: cleanNum(document.getElementById('initialBill').value)
            };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "finanzas_export.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.dataStore) {
                        const safeData = imported.dataStore.map(item => ({
                            ...item,
                            exp_tc: item.exp_tc || 0,
                            exp_free: item.exp_free !== undefined ? item.exp_free : (item.exp || 0)
                        }));
                        localStorage.setItem('finanzas_data_v3', JSON.stringify(safeData));
                        localStorage.setItem('finanzas_quota_v3', imported.quota || 5000000);
                        localStorage.setItem('finanzas_bill_v3', imported.initialBill || 0);
                        location.reload();
                    }
                } catch (err) {
                    alert("El archivo no es válido o está corrupto.");
                }
            };
            reader.readAsText(file);
        }

        // --- RENDERIZADO UI ---
        function init() {
            let idx = 0;
            for (let m = 1; m <= months; m++) {
                const mDiv = document.createElement('div');
                mDiv.className = 'month-container';
                mDiv.innerHTML = `<div class="month-header">MES ${m}</div>`;

                const grid = document.createElement('div');
                grid.className = 'quincenas-grid';

                for (let q = 1; q <= qPerMonth; q++) {
                    const isQ1 = (q === 1);
                    const d = dataStore[idx]; 
                    
                    const dateRange = isQ1 ? '1 - 15' : '16 - 30';

                    const cell = document.createElement('div');
                    cell.className = 'q-card';
                    cell.id = `q-card-${idx}`; 
                    
                    cell.innerHTML = `
                        <div class="q-title">
                            <span style="display:flex; align-items:center;">
                                Quincena ${q} 
                                <span class="date-range">${dateRange}</span>
                            </span>
                            ${isQ1 
                                ? '<span class="badge bg-pay">Pago Día 2</span>' 
                                : '<span class="badge">Abono Voluntario</span>'}
                        </div>

                        <div class="section sec-cash">
                            <span class="lbl-sec txt-gr">Caja (Efectivo)</span>
                            <div class="row"><label>Anterior:</label><strong id="cash-prev-${idx}">$0</strong></div>
                            
                            ${isQ1 ? `
                            <div class="row">
                                <label class="txt-gr">+ Ingresos:</label>
                                <input type="text" inputmode="numeric" class="val inp-inc" data-i="${idx}" value="${fmtInput(d.inc)}">
                            </div>
                            <div class="row">
                                <label class="txt-gr">+ Ahorros:</label>
                                <input type="text" inputmode="numeric" class="val inp-sav" data-i="${idx}" value="${fmtInput(d.sav)}">
                            </div>
                            ` : ''}
                            
                            <div class="row" style="border-bottom: 1px solid #a3e4d7; padding-bottom: 8px; margin-top: 6px; margin-bottom: 10px;">
                                <label style="color:var(--green); font-weight:bold; font-size:0.85rem;">= Total Inicial:</label>
                                <span id="cash-subtotal-${idx}" style="color:var(--green); font-weight:bold;">$0</span>
                            </div>
                            
                            <div class="row"><label class="txt-rd">- Gastos est. TC:</label><input type="text" inputmode="numeric" class="val inp-exp-tc" data-i="${idx}" value="${fmtInput(d.exp_tc)}"></div>
                            <div class="row"><label class="txt-rd">- Gastos libres:</label><input type="text" inputmode="numeric" class="val inp-exp-free" data-i="${idx}" value="${fmtInput(d.exp_free)}"></div>
                            
                            <div class="row" style="font-size:0.8rem; color:var(--orange);">
                                <label>- Salida Pago TC:</label><span id="val-pay-note-${idx}">$0</span>
                            </div>

                            <div class="res-row txt-gr">
                                <span>Disponible:</span><span id="cash-final-${idx}">$0</span>
                            </div>
                        </div>

                        <div class="section sec-card">
                            <span class="lbl-sec txt-bl">Tarjeta de Crédito</span>
                            <div class="row"><label>Deuda Total Ant.:</label><strong id="debt-prev-${idx}">$0</strong></div>
                            
                            <div class="row">
                                <label class="txt-or bold">${isQ1 ? 'Pago (Día 2):' : 'Abono Q2:'}</label>
                                <input type="text" inputmode="numeric" class="val inp-pay" data-i="${idx}" value="${fmtInput(d.pay)}" style="color:var(--orange); font-weight:bold; border-color:var(--orange);">
                            </div>

                            <div class="row"><label class="txt-bl">+ Compras Nuevas:</label><input type="text" inputmode="numeric" class="val inp-spend" data-i="${idx}" value="${fmtInput(d.spend)}"></div>

                            <div class="res-row txt-bl">
                                <span>Deuda Total:</span><span id="debt-final-${idx}">$0</span>
                            </div>
                            
                            <div class="quota-row">
                                <label>Cupo Disponible:</label>
                                <span id="quota-final-${idx}">$0</span>
                            </div>
                        </div>

                        ${isQ1 ? `
                        <div class="section sec-bill">
                            <span class="lbl-sec txt-pr">Factura (Vence Día 2)</span>
                            
                            <div style="background:#fff; padding:8px; border:1px dashed var(--purple); border-radius:4px; margin-bottom:10px;">
                                <div class="row"><label>Facturado Total:</label><span id="bill-original-${idx}">$0</span></div>
                                <div class="row" style="color:#666; font-size:0.85rem; border-bottom:1px solid #eee; padding-bottom:5px;"><label>(-) Abonos Q2:</label><span id="bill-deduct-q2-${idx}">$0</span></div>
                                <div class="row bold txt-or" style="margin-top:5px;"><label>Pendiente Real:</label><span id="bill-pending-${idx}">$0</span></div>
                            </div>

                            <div class="row" style="font-size:0.85rem; margin-bottom:10px;">
                                <label>Estado:</label>
                                <span id="bill-status-${idx}">---</span>
                            </div>

                            <hr style="border:0; border-top:1px dashed #ccc;">

                            <div class="row bold txt-pr">
                                <label>Nuevo Corte (Día 15):</label>
                                <span id="bill-new-${idx}">$0</span>
                            </div>
                        </div>
                        ` : ''}
                    `;
                    grid.appendChild(cell);
                    idx++;
                }
                
                mDiv.appendChild(grid);
                
                const footer = document.createElement('div');
                footer.className = 'month-footer';
                footer.innerHTML = `
                    <label style="font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; opacity:0.9;">Total Gastos Mes (Efectivo + Tarjeta)</label>
                    <span id="month-total-expenses-${m}">$0</span>
                `;
                mDiv.appendChild(footer);

                container.appendChild(mDiv);
            }

            document.querySelectorAll('input.val, input#globalQuota, input#initialBill, input#globalExpFree, select#globalExpFreePeriod, select#globalExpFreeStart').forEach(inp => {
                if(inp.id !== 'globalExpFreePeriod' && inp.id !== 'globalExpFreeStart') {
                    inp.addEventListener('input', updateData);
                    inp.addEventListener('focus', function(e) {
                        let num = cleanNum(this.value);
                        this.value = num === 0 ? '' : num;
                    });
                    inp.addEventListener('blur', function(e) {
                        let num = cleanNum(this.value);
                        this.value = fmtInput(num);
                    });
                } else {
                    inp.addEventListener('change', updateData);
                }
            });
        }

        // --- MANEJO DE EVENTOS ---
        function updateData(e) {
            const el = e.target;
            const val = cleanNum(el.value); 

            if(el.id === 'globalQuota' || el.id === 'initialBill' || el.id === 'globalExpFree' || el.id === 'globalExpFreePeriod' || el.id === 'globalExpFreeStart') { 
                recalculate(); 
                return; 
            }

            const idx = parseInt(el.getAttribute('data-i'));

            if(el.classList.contains('inp-inc')) dataStore[idx].inc = val;
            if(el.classList.contains('inp-sav')) dataStore[idx].sav = val;
            if(el.classList.contains('inp-exp-tc')) dataStore[idx].exp_tc = val;
            if(el.classList.contains('inp-exp-free')) dataStore[idx].exp_free = val;
            if(el.classList.contains('inp-pay')) dataStore[idx].pay = val;
            if(el.classList.contains('inp-spend')) dataStore[idx].spend = val;

            recalculate();
        }

        // --- CÁLCULO CORE ---
        function recalculate() {
            const globalQuota = cleanNum(document.getElementById('globalQuota').value);
            let initialBill = cleanNum(document.getElementById('initialBill').value);
            
            let cash = 0;
            let totalDebt = initialBill; 
            let prevQ2Spend = 0; 
            let currentMonthExpenses = 0; 

            for (let i = 0; i < dataStore.length; i++) {
                const d = dataStore[i];
                const isQ1 = (i % 2 === 0);
                
                let hasAlert = false;

                currentMonthExpenses += (d.exp_tc || 0) + (d.exp_free || 0) + (d.spend || 0);

                document.getElementById(`cash-prev-${i}`).innerText = fmt(cash);
                document.getElementById(`debt-prev-${i}`).innerText = fmt(totalDebt);
                document.getElementById(`val-pay-note-${i}`).innerText = `-${fmt(d.pay)}`;

                let subtotalCash = cash + (d.inc || 0) + (d.sav || 0);
                document.getElementById(`cash-subtotal-${i}`).innerText = fmt(subtotalCash);

                cash = subtotalCash - (d.exp_tc || 0) - (d.exp_free || 0) - (d.pay || 0);
                
                if (cash < 0) hasAlert = true;

                const elCash = document.getElementById(`cash-final-${i}`);
                elCash.innerText = fmt(cash);
                elCash.className = cash < 0 ? 'res-row txt-rd' : 'res-row txt-gr';

                totalDebt = totalDebt + (d.spend || 0) - (d.pay || 0);
                document.getElementById(`debt-final-${i}`).innerText = fmt(totalDebt);

                const quotaLeft = globalQuota - totalDebt;
                const elQuota = document.getElementById(`quota-final-${i}`);
                elQuota.innerText = fmt(quotaLeft);
                if(quotaLeft < 0) elQuota.style.color = "var(--red)";
                else if (quotaLeft < globalQuota * 0.1) elQuota.style.color = "var(--orange)";
                else elQuota.style.color = "var(--green)";

                if (isQ1) {
                    let billOriginal = (i === 0) ? initialBill : (i > 0 ? dataStore[i-1].billGenerated : 0);
                    let paymentsInQ2 = (i > 0) ? dataStore[i-1].pay : 0;
                    let billPendingReal = Math.max(0, billOriginal - paymentsInQ2);

                    document.getElementById(`bill-original-${i}`).innerText = fmt(billOriginal);
                    document.getElementById(`bill-deduct-q2-${i}`).innerText = `-${fmt(paymentsInQ2)}`;
                    document.getElementById(`bill-pending-${i}`).innerText = fmt(billPendingReal);

                    const statusEl = document.getElementById(`bill-status-${i}`);
                    const remainingAfterToday = billPendingReal - (d.pay || 0);

                    if (remainingAfterToday <= 0) {
                        statusEl.innerText = "Cubierto";
                        statusEl.style.color = "var(--green)";
                    } else {
                        statusEl.innerText = `Falta: ${fmt(remainingAfterToday)}`;
                        statusEl.style.color = "var(--red)";
                        hasAlert = true; 
                    }

                    let newBill = prevQ2Spend + (d.spend || 0) + remainingAfterToday;
                    document.getElementById(`bill-new-${i}`).innerText = fmt(newBill);
                    
                    d.billGenerated = newBill;
                    prevQ2Spend = 0; 
                } else {
                    prevQ2Spend = (d.spend || 0);
                    d.billGenerated = dataStore[i-1].billGenerated; 
                }

                const cardEl = document.getElementById(`q-card-${i}`);
                if (hasAlert) {
                    cardEl.classList.add('q-card-alert');
                } else {
                    cardEl.classList.remove('q-card-alert');
                }

                if (!isQ1) {
                    let currentMonth = Math.floor(i / 2) + 1;
                    document.getElementById(`month-total-expenses-${currentMonth}`).innerText = fmt(currentMonthExpenses);
                    currentMonthExpenses = 0; 
                }
            }
            
            saveData();
        }

        loadData();
        init();
        recalculate();
    </script>
</body>
</html>
