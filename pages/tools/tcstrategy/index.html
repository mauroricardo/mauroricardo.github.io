<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Financiero Pro</title>
    <style>
        :root {
            --bg: #f4f7f6;
            --text: #2c3e50;
            --green: #27ae60;
            --red: #c0392b;
            --blue: #3498db;
            --blue-dark: #2980b9;
            --orange: #d35400;
            --purple: #8e44ad;
            --gray: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            max-width: 1150px;
            margin-left: auto;
            margin-right: auto;
            scroll-behavior: smooth;
        }

        /* PANEL CONFIG */
        .config-panel {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .config-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .config-item { display: flex; flex-direction: column; }
        
        .config-item label {
            font-size: 0.75rem;
            color: #bdc3c7;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .config-item input {
            padding: 8px;
            font-size: 1rem;
            border: none;
            border-radius: 5px;
            width: 110px;
            text-align: center;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
        }
        
        .config-select {
            padding: 8px;
            font-size: 0.95rem;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #2c3e50;
            height: 38px;
            box-sizing: border-box;
            cursor: pointer;
        }

        .panel-divider {
            width: 2px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            margin: 0 5px;
            align-self: center;
        }

        .btn-wrap {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-action {
            background-color: var(--blue);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-action:hover { background-color: var(--blue-dark); }

        .btn-reset {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 0.9rem;
            height: 38px;
        }
        .btn-reset:hover { background-color: #c0392b; }

        /* CONTENEDOR MESES */
        .month-container {
            background: #fff;
            border: 1px solid #dfe6e9;
            border-radius: 12px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            scroll-margin-top: 20px;
        }

        .month-header {
            background-color: #ecf0f1;
            padding: 10px 20px;
            font-weight: 900;
            color: var(--text);
            border-bottom: 1px solid #bdc3c7;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .quincenas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 950px) {
            .quincenas-grid { grid-template-columns: 1fr; }
            .quincenas-grid > div:first-child { border-bottom: 1px dashed #ccc; }
            .panel-divider { display: none; }
        }

        .q-card {
            padding: 15px 20px;
            border-right: 1px dashed #bdc3c7;
            position: relative;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        .q-card:last-child { border-right: none; }

        .q-card-alert {
            background-color: rgba(231, 76, 60, 0.06) !important;
            box-shadow: inset 0 0 0 3px rgba(231, 76, 60, 0.5) !important;
        }

        .q-title {
            font-weight: bold;
            color: #34495e;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
        }

        .date-range {
            font-size: 1.6rem;
            color: var(--blue);
            font-weight: 900;
            margin-left: 10px;
        }

        .section {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
        }
        .sec-cash { background-color: #eafaf1; border-left: 4px solid var(--green); }
        .sec-card { background-color: #ebf5fb; border-left: 4px solid var(--blue); }
        .sec-bill { background-color: #f4ecf7; border-left: 4px solid var(--purple); margin-top: 15px; border: 1px solid #e8daef; }

        .lbl-sec {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 900;
            display: block;
            margin-bottom: 10px;
        }

        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        input.val {
            width: 100px;
            padding: 5px 6px;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
            text-align: right;
            font-family: monospace;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        input.val:focus {
            outline: none;
            border-color: var(--blue);
            background-color: #fdfefe;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }

        .txt-gr { color: var(--green); }
        .txt-rd { color: var(--red); }
        .txt-bl { color: var(--blue-dark); }
        .txt-or { color: var(--orange); }
        .txt-pr { color: var(--purple); }
        .bold { font-weight: bold; }

        .res-row {
            border-top: 1px solid rgba(0,0,0,0.1);
            margin-top: 10px;
            padding-top: 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            font-size: 1.05rem;
        }

        .badge {
            font-size: 0.65rem;
            padding: 3px 6px;
            border-radius: 4px;
            color: white;
            background: #95a5a6;
            text-transform: uppercase;
        }
        .bg-pay { background: var(--orange); }

        .quota-row {
            background: #fff;
            padding: 6px 8px;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
            color: #34495e;
            border: 1px solid #bdc3c7;
            display: flex; 
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .month-footer {
            background-color: var(--blue);
            color: white;
            padding: 12px 25px;
            text-align: right;
            font-size: 1.1rem;
            font-weight: bold;
            border-top: 3px solid var(--blue-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .month-footer span {
            font-size: 1.3rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 4px;
        }

        /* PANELES DE RESUMEN */
        .summary-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 800px) {
            .summary-container { grid-template-columns: 1fr; }
        }

        .summary-panel {
            background: #fff;
            border-radius: 12px;
            padding: 20px 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid #dfe6e9;
        }

        .p-orange { border-left: 5px solid var(--orange); }
        .p-red { border-left: 5px solid var(--red); }

        .summary-title {
            font-size: 1.1rem;
            color: #34495e;
            font-weight: 900;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .summary-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }
        .summary-item {
            background: #fdfefe;
            border: 1px solid #ecf0f1;
            padding: 10px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: var(--text);
            font-size: 0.9rem;
        }
        .summary-item.clickable {
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .summary-item.clickable:hover {
            transform: translateY(-2px);
            background: #f4f7f6;
            border-color: var(--red);
        }
        .summary-item span.val { color: var(--orange); }
        .summary-item span.alert-tag { color: var(--red); }

        .summary-total {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 2px dashed #bdc3c7;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 900;
        }
        .summary-total span.val {
            color: var(--red);
            background: #fdedec;
            padding: 2px 10px;
            border-radius: 4px;
        }

    </style>
</head>
<body>

    <div class="config-panel">
        <div class="config-inputs">
            <div class="config-item">
                <label>Cupo Tarjeta</label>
                <input type="text" inputmode="numeric" id="globalQuota" value="5.000.000">
            </div>
            <div class="config-item">
                <label>Factura (Mes 1)</label>
                <input type="text" inputmode="numeric" id="initialBill" value="0" style="color:var(--purple)">
            </div>
            <div class="panel-divider"></div>
            <div class="config-item">
                <label>Gasto Libre</label>
                <input type="text" inputmode="numeric" id="globalExpFree" value="0">
            </div>
            <div class="config-item">
                <label>Mes Inicio</label>
                <select id="globalExpFreeStart" class="config-select">
                    <option value="1">Mes 1</option><option value="2">Mes 2</option><option value="3">Mes 3</option><option value="4">Mes 4</option>
                    <option value="5">Mes 5</option><option value="6">Mes 6</option><option value="7">Mes 7</option><option value="8">Mes 8</option>
                    <option value="9">Mes 9</option><option value="10">Mes 10</option><option value="11">Mes 11</option><option value="12">Mes 12</option>
                </select>
            </div>
            <div class="config-item">
                <label>Frecuencia</label>
                <select id="globalExpFreePeriod" class="config-select">
                    <option value="1">Mensual</option><option value="2">Bimensual</option><option value="3">Trimestral</option>
                    <option value="4">Cuatrimestral</option><option value="6">Semestral</option>
                </select>
            </div>
            <button class="btn-action" style="background-color: var(--orange);" onclick="applyGlobalExpFree()">Aplicar</button>
        </div>

        <div class="btn-wrap">
            <button class="btn-action" onclick="exportData()">Exportar</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn-action" onclick="document.getElementById('importFile').click()">Importar</button>
            <button class="btn-reset" onclick="resetData()">Limpiar</button>
        </div>
    </div>

    <div id="app"></div>

    <div class="summary-container">
        <div id="summary-exp-free" class="summary-panel p-orange" style="display:none;"></div>
        <div id="summary-desfase" class="summary-panel p-red" style="display:none;"></div>
    </div>

    <script>
        const months = 12;
        const qPerMonth = 2;
        const container = document.getElementById('app');
        const summaryExpContainer = document.getElementById('summary-exp-free');
        const summaryDesfaseContainer = document.getElementById('summary-desfase');
        
        const fmt = (n) => new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(n);
        const fmtInput = (n) => new Intl.NumberFormat('es-CO').format(n);

        function cleanNum(str) {
            if (typeof str === 'number') return str;
            if (!str) return 0;
            const num = parseFloat(str.toString().replace(/[^0-9-]/g, ''));
            return isNaN(num) ? 0 : num;
        }

        const defaultData = Array(months * qPerMonth).fill(null).map((_, index) => {
            const isQ1 = (index % 2 === 0);
            return { inc: isQ1 ? 3000000 : 0, sav: isQ1 ? 500 : 0, exp_tc: 0, exp_free: 0, pay: 0, spend: 0, billGenerated: 0 };
        });

        let dataStore = [];

        function loadData() {
            const savedData = localStorage.getItem('finanzas_data_v3');
            const savedQuota = localStorage.getItem('finanzas_quota_v3');
            const savedBill = localStorage.getItem('finanzas_bill_v3');
            const savedGlobalExp = localStorage.getItem('finanzas_global_exp');
            const savedGlobalPer = localStorage.getItem('finanzas_global_per');
            const savedGlobalStart = localStorage.getItem('finanzas_global_start');

            if (savedData) {
                dataStore = JSON.parse(savedData).map(item => ({...item, exp_tc: item.exp_tc || 0, exp_free: item.exp_free !== undefined ? item.exp_free : (item.exp || 0)}));
            } else { dataStore = JSON.parse(JSON.stringify(defaultData)); }

            if (savedQuota) document.getElementById('globalQuota').value = fmtInput(savedQuota);
            if (savedBill) document.getElementById('initialBill').value = fmtInput(savedBill);
            if (savedGlobalExp) document.getElementById('globalExpFree').value = fmtInput(savedGlobalExp);
            if (savedGlobalPer) document.getElementById('globalExpFreePeriod').value = savedGlobalPer;
            if (savedGlobalStart) document.getElementById('globalExpFreeStart').value = savedGlobalStart;
        }

        function saveData() {
            localStorage.setItem('finanzas_data_v3', JSON.stringify(dataStore));
            localStorage.setItem('finanzas_quota_v3', cleanNum(document.getElementById('globalQuota').value));
            localStorage.setItem('finanzas_bill_v3', cleanNum(document.getElementById('initialBill').value));
            localStorage.setItem('finanzas_global_exp', cleanNum(document.getElementById('globalExpFree').value));
            localStorage.setItem('finanzas_global_per', document.getElementById('globalExpFreePeriod').value);
            localStorage.setItem('finanzas_global_start', document.getElementById('globalExpFreeStart').value);
        }

        function resetData() {
            if (confirm("¿Borrar todo?")) { localStorage.clear(); location.reload(); }
        }

        function applyGlobalExpFree() {
            const val = cleanNum(document.getElementById('globalExpFree').value);
            const period = parseInt(document.getElementById('globalExpFreePeriod').value); 
            const startMonth = parseInt(document.getElementById('globalExpFreeStart').value); 
            for (let i = 0; i < dataStore.length; i++) {
                dataStore[i].exp_free = 0;
                if (i % 2 === 0) {
                    const mNum = Math.floor(i / 2) + 1;
                    if (mNum >= startMonth && (mNum - startMonth) % period === 0) dataStore[i].exp_free = val;
                }
            }
            init(); recalculate();
        }

        function exportData() {
            const exportObj = { dataStore, quota: cleanNum(document.getElementById('globalQuota').value), initialBill: cleanNum(document.getElementById('initialBill').value), globalExpFree: cleanNum(document.getElementById('globalExpFree').value), globalExpFreeStart: document.getElementById('globalExpFreeStart').value, globalExpFreePeriod: document.getElementById('globalExpFreePeriod').value };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
            const a = document.createElement('a'); a.href = dataStr; a.download = "finanzas_export.json"; a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imp = JSON.parse(e.target.result);
                if (imp.dataStore) {
                    localStorage.setItem('finanzas_data_v3', JSON.stringify(imp.dataStore));
                    localStorage.setItem('finanzas_quota_v3', imp.quota); localStorage.setItem('finanzas_bill_v3', imp.initialBill);
                    localStorage.setItem('finanzas_global_exp', imp.globalExpFree); localStorage.setItem('finanzas_global_start', imp.globalExpFreeStart);
                    localStorage.setItem('finanzas_global_per', imp.globalExpFreePeriod);
                    location.reload();
                }
            };
            reader.readAsText(event.target.files[0]);
        }

        function init() {
            container.innerHTML = '';
            let idx = 0;
            for (let m = 1; m <= months; m++) {
                const mDiv = document.createElement('div');
                mDiv.className = 'month-container';
                mDiv.id = `month-section-${m}`;
                mDiv.innerHTML = `<div class="month-header">MES ${m}</div>`;
                const grid = document.createElement('div');
                grid.className = 'quincenas-grid';

                for (let q = 1; q <= qPerMonth; q++) {
                    const isQ1 = (q === 1);
                    const d = dataStore[idx]; 
                    grid.innerHTML += `
                        <div class="q-card" id="q-card-${idx}">
                            <div class="q-title">
                                <span>Quincena ${q} <span class="date-range">${isQ1 ? '1 - 15' : '16 - 30'}</span></span>
                                ${isQ1 ? '<span class="badge bg-pay">Pago Día 2</span>' : '<span class="badge">Abono Voluntario</span>'}
                            </div>
                            <div class="section sec-cash">
                                <span class="lbl-sec txt-gr">Caja (Efectivo)</span>
                                <div class="row"><label>Anterior:</label><strong id="cash-prev-${idx}">$0</strong></div>
                                ${isQ1 ? `<div class="row"><label class="txt-gr">+ Ingresos:</label><input type="text" class="val inp-inc" data-i="${idx}" value="${fmtInput(d.inc)}"></div>
                                <div class="row"><label class="txt-gr">+ Ahorros:</label><input type="text" class="val inp-sav" data-i="${idx}" value="${fmtInput(d.sav)}"></div>` : ''}
                                <div class="row" style="border-bottom: 1px solid #a3e4d7; padding-bottom: 8px; margin-top: 6px;"><label class="txt-gr bold">= Total Inicial:</label><span id="cash-subtotal-${idx}" class="txt-gr bold">$0</span></div>
                                <div class="row"><label class="txt-rd">- Gastos est. TC:</label><input type="text" class="val inp-exp-tc" data-i="${idx}" value="${fmtInput(d.exp_tc)}"></div>
                                <div class="row"><label class="txt-rd">- Gastos libres:</label><input type="text" class="val inp-exp-free" data-i="${idx}" value="${fmtInput(d.exp_free)}"></div>
                                <div class="row" style="font-size:0.8rem; color:var(--orange);"><label>- Salida Pago TC:</label><span id="val-pay-note-${idx}">$0</span></div>
                                <div class="res-row txt-gr"><span>Disponible:</span><span id="cash-final-${idx}">$0</span></div>
                            </div>
                            <div class="section sec-card">
                                <span class="lbl-sec txt-bl">Tarjeta de Crédito</span>
                                <div class="row"><label>Deuda Ant.:</label><strong id="debt-prev-${idx}">$0</strong></div>
                                <div class="row"><label class="txt-or bold">${isQ1 ? 'Pago (Día 2):' : 'Abono Q2:'}</label><input type="text" class="val inp-pay" data-i="${idx}" value="${fmtInput(d.pay)}" style="color:var(--orange); font-weight:bold;"></div>
                                <div class="row"><label class="txt-bl">+ Compras Nuevas:</label><input type="text" class="val inp-spend" data-i="${idx}" value="${fmtInput(d.spend)}"></div>
                                <div class="res-row txt-bl"><span>Deuda Total:</span><span id="debt-final-${idx}">$0</span></div>
                                <div class="quota-row"><label>Cupo Disp.:</label><span id="quota-final-${idx}">$0</span></div>
                            </div>
                            ${isQ1 ? `<div class="section sec-bill"><span class="lbl-sec txt-pr">Factura</span>
                                <div style="background:#fff; padding:8px; border:1px dashed var(--purple); border-radius:4px;">
                                    <div class="row"><label>Facturado:</label><span id="bill-original-${idx}">$0</span></div>
                                    <div class="row" style="color:#666; font-size:0.85rem;"><label>(-) Abonos Q2:</label><span id="bill-deduct-q2-${idx}">$0</span></div>
                                    <div class="row bold txt-or"><label>Pendiente:</label><span id="bill-pending-${idx}">$0</span></div>
                                </div>
                                <div class="row" style="font-size:0.85rem; margin-top:5px;"><label>Estado:</label><span id="bill-status-${idx}">---</span></div>
                                <div class="row bold txt-pr" style="margin-top:10px;"><label>Nuevo Corte (Día 15):</label><span id="bill-new-${idx}">$0</span></div>
                            </div>` : ''}
                        </div>`;
                    idx++;
                }
                mDiv.appendChild(grid);
                const footer = document.createElement('div');
                footer.className = 'month-footer';
                footer.innerHTML = `<label>Total Gastos Mes:</label><span id="month-total-expenses-${m}">$0</span>`;
                mDiv.appendChild(footer);
                container.appendChild(mDiv);
            }
            document.querySelectorAll('input.val').forEach(inp => {
                inp.addEventListener('input', updateData);
                inp.addEventListener('focus', function() { let n = cleanNum(this.value); this.value = n === 0 ? '' : n; });
                inp.addEventListener('blur', function() { this.value = fmtInput(cleanNum(this.value)); });
            });
        }

        function updateData(e) {
            const el = e.target; const val = cleanNum(el.value); const idx = parseInt(el.getAttribute('data-i'));
            if (el.classList.contains('inp-inc')) dataStore[idx].inc = val;
            if (el.classList.contains('inp-sav')) dataStore[idx].sav = val;
            if (el.classList.contains('inp-exp-tc')) dataStore[idx].exp_tc = val;
            if (el.classList.contains('inp-exp-free')) dataStore[idx].exp_free = val;
            if (el.classList.contains('inp-pay')) dataStore[idx].pay = val;
            if (el.classList.contains('inp-spend')) dataStore[idx].spend = val;
            recalculate();
        }

        function scrollToMonth(mNum) {
            const el = document.getElementById(`month-section-${mNum}`);
            if(el) el.scrollIntoView({ behavior: 'smooth' });
        }

        function recalculate() {
            const globalQuota = cleanNum(document.getElementById('globalQuota').value);
            let initialBill = cleanNum(document.getElementById('initialBill').value);
            let cash = 0, totalDebt = initialBill, prevQ2Spend = 0, currentMonthExpenses = 0;
            let expFreeHTML = '', desfaseHTML = '', globalExpFreeTotal = 0;
            let desfaseMonths = new Set();

            for (let i = 0; i < dataStore.length; i++) {
                const d = dataStore[i], isQ1 = (i % 2 === 0), mNum = Math.floor(i / 2) + 1;
                let hasAlert = false;
                currentMonthExpenses += (d.exp_tc || 0) + (d.exp_free || 0) + (d.spend || 0);

                document.getElementById(`cash-prev-${i}`).innerText = fmt(cash);
                document.getElementById(`debt-prev-${i}`).innerText = fmt(totalDebt);
                document.getElementById(`val-pay-note-${i}`).innerText = `-${fmt(d.pay)}`;

                let subtotalCash = cash + (d.inc || 0) + (d.sav || 0);
                document.getElementById(`cash-subtotal-${i}`).innerText = fmt(subtotalCash);
                cash = subtotalCash - (d.exp_tc || 0) - (d.exp_free || 0) - (d.pay || 0);
                if (cash < 0) hasAlert = true;
                const elCash = document.getElementById(`cash-final-${i}`);
                elCash.innerText = fmt(cash); elCash.className = cash < 0 ? 'res-row txt-rd' : 'res-row txt-gr';

                totalDebt = totalDebt + (d.spend || 0) - (d.pay || 0);
                document.getElementById(`debt-final-${i}`).innerText = fmt(totalDebt);
                const quotaLeft = globalQuota - totalDebt;
                const elQuota = document.getElementById(`quota-final-${i}`);
                elQuota.innerText = fmt(quotaLeft); elQuota.style.color = quotaLeft < 0 ? "var(--red)" : (quotaLeft < globalQuota * 0.1 ? "var(--orange)" : "var(--green)");
                if (quotaLeft < 0) hasAlert = true;

                if (isQ1) {
                    let billOrig = (i === 0) ? initialBill : dataStore[i-1].billGenerated;
                    let payQ2 = (i > 0) ? dataStore[i-1].pay : 0;
                    let billPend = Math.max(0, billOrig - payQ2);
                    document.getElementById(`bill-original-${i}`).innerText = fmt(billOrig);
                    document.getElementById(`bill-deduct-q2-${i}`).innerText = `-${fmt(payQ2)}`;
                    document.getElementById(`bill-pending-${i}`).innerText = fmt(billPend);
                    const rem = billPend - (d.pay || 0);
                    const st = document.getElementById(`bill-status-${i}`);
                    if (rem <= 0) { st.innerText = "Cubierto"; st.style.color = "var(--green)"; } 
                    else { st.innerText = `Falta: ${fmt(rem)}`; st.style.color = "var(--red)"; hasAlert = true; }
                    d.billGenerated = prevQ2Spend + (d.spend || 0) + rem;
                    document.getElementById(`bill-new-${i}`).innerText = fmt(d.billGenerated);
                    prevQ2Spend = 0;
                } else {
                    prevQ2Spend = d.spend; d.billGenerated = dataStore[i-1].billGenerated;
                    let mTotalFree = (dataStore[i-1].exp_free || 0) + (d.exp_free || 0);
                    if (mTotalFree > 0) { expFreeHTML += `<li class="summary-item">Mes ${mNum} <span class="val">${fmt(mTotalFree)}</span></li>`; globalExpFreeTotal += mTotalFree; }
                    document.getElementById(`month-total-expenses-${mNum}`).innerText = fmt(currentMonthExpenses); currentMonthExpenses = 0;
                }

                if (hasAlert) desfaseMonths.add(mNum);
                document.getElementById(`q-card-${i}`).className = `q-card ${hasAlert ? 'q-card-alert' : ''}`;
            }

            // Renderizado Paneles
            if (expFreeHTML) {
                summaryExpContainer.style.display = 'block';
                summaryExpContainer.innerHTML = `<div class="summary-title">Gastos Libres</div><ul class="summary-list">${expFreeHTML}</ul><div class="summary-total">Total Anual: <span class="val">${fmt(globalExpFreeTotal)}</span></div>`;
            } else summaryExpContainer.style.display = 'none';

            if (desfaseMonths.size > 0) {
                summaryDesfaseContainer.style.display = 'block';
                let listHTML = '';
                Array.from(desfaseMonths).sort((a,b)=>a-b).forEach(m => {
                    listHTML += `<li class="summary-item clickable" onclick="scrollToMonth(${m})">Mes ${m} <span class="alert-tag">Revisar ↓</span></li>`;
                });
                summaryDesfaseContainer.innerHTML = `<div class="summary-title">Meses con Desfase</div><ul class="summary-list">${listHTML}</ul>`;
            } else summaryDesfaseContainer.style.display = 'none';

            saveData();
        }

        loadData(); init(); recalculate();
    </script>
</body>
</html>
