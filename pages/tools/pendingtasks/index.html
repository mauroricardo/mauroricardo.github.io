<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pendientes Pro</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #4a90e2;
            --secondary: #6c757d;
            --success: #28a745;
            --border: #ddd;
            
            /* Gamas de colores para urgencia */
            --urgency-3d: #fff3cd; 
            --urgency-2d: #ffeeba; 
            --urgency-1d: #ffdf7e; 
            --urgency-today: #f8d7da; 
            
            --urgency-3h: #f5c6cb; 
            --urgency-2h: #f1b0b7; 
            --urgency-1h: #ea868f; 
            --overdue: #dc3545; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 650px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .header-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .btn-small {
            padding: 0.25rem 0.5rem;
            font-size: 0.8rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: bold;
            color: #777;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .form-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        input[type="text"] { flex: 1 1 100%; }
        input[type="date"], input[type="time"] { flex: 1; }
        input, button {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        button {
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover { opacity: 0.9; }
        
        .btn-danger { background-color: var(--overdue); }
        .btn-success { background-color: var(--success); }
        .btn-secondary { background-color: var(--secondary); }
        
        .btn-edit { background-color: #ffc107; color: #333; }
        .btn-cancel { background-color: var(--secondary); display: none; }

        .task-list { list-style: none; padding: 0; }

        .task-item {
            background: white;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-content { flex: 1; }
        .task-title { margin: 0 0 0.25rem 0; font-weight: bold; }
        .task-meta { margin: 0; font-size: 0.85rem; color: #666; }

        /* Estilos de urgencia */
        .u-3d { background-color: var(--urgency-3d); }
        .u-2d { background-color: var(--urgency-2d); }
        .u-1d { background-color: var(--urgency-1d); }
        .u-today { background-color: var(--urgency-today); }
        .u-3h { background-color: var(--urgency-3h); }
        .u-2h { background-color: var(--urgency-2h); }
        .u-1h { background-color: var(--urgency-1h); color: white;}
        .u-overdue { background-color: var(--overdue); color: white; }
        .u-1h .task-meta, .u-overdue .task-meta { color: #ffeaea; }

        #import-input { display: none; }
    </style>
</head>
<body>

    <div class="header-actions">
        <button class="btn-success btn-small" onclick="exportTasks()">⬇ Exportar JSON</button>
        <button class="btn-secondary btn-small" onclick="document.getElementById('import-input').click()">⬆ Importar JSON</button>
        <input type="file" id="import-input" accept=".json" onchange="importTasks(event)">
    </div>

    <h2>Gestor de Pendientes</h2>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('active')">Activos</button>
        <button class="tab" onclick="switchTab('completed')">Historial</button>
    </div>

    <div id="tab-active" class="tab-content active">
        <form id="task-form" class="form-group">
            <input type="text" id="task-text" placeholder="¿Qué hay pendiente?" required>
            <input type="date" id="task-date">
            <input type="time" id="task-time">
            <button type="submit" id="submit-btn" style="flex: 1;">Agregar Pendiente</button>
            <button type="button" id="cancel-btn" class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
        </form>
        <ul id="active-list" class="task-list"></ul>
    </div>

    <div id="tab-completed" class="tab-content">
        <div style="text-align: right; margin-bottom: 1rem;">
            <button class="btn-danger btn-small" onclick="clearHistory()">Limpiar Historial</button>
        </div>
        <ul id="completed-list" class="task-list"></ul>
    </div>

    <script>
        const STORAGE_KEY = 'app_pendientes_data';
        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editingId = null;

        const form = document.getElementById('task-form');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const activeList = document.getElementById('active-list');
        const completedList = document.getElementById('completed-list');

        function init() {
            renderTasks();
            form.addEventListener('submit', handleFormSubmit);
            setInterval(renderTasks, 60000); 
        }

        // --- IMPORTACIÓN / EXPORTACIÓN ---
        
        function exportTasks() {
            if (tasks.length === 0) return alert("No hay tareas para exportar.");
            
            const dataStr = JSON.stringify(tasks, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement("a");
            link.href = url;
            link.download = `respaldo_pendientes_${new Date().toISOString().slice(0,10)}.json`;
            link.click();
            URL.revokeObjectURL(url);
        }

        function importTasks(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedTasks = JSON.parse(e.target.result);
                    if (Array.isArray(importedTasks)) {
                        if (confirm("¿Deseas reemplazar tus tareas actuales con el archivo importado?")) {
                            tasks = importedTasks;
                            saveTasks();
                            alert("Importación exitosa.");
                        }
                    } else {
                        alert("El archivo no tiene el formato correcto.");
                    }
                } catch (err) {
                    alert("Error al leer el archivo JSON.");
                }
                event.target.value = ''; // Reset input
            };
            reader.readAsText(file);
        }

        // --- LÓGICA CORE ---

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            renderTasks();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const text = document.getElementById('task-text').value;
            const date = document.getElementById('task-date').value;
            const time = document.getElementById('task-time').value;

            if (editingId) {
                const idx = tasks.findIndex(t => t.id === editingId);
                if (idx !== -1) {
                    tasks[idx].text = text;
                    tasks[idx].date = date || null;
                    tasks[idx].time = time || null;
                }
                cancelEdit();
            } else {
                tasks.push({
                    id: Date.now().toString(),
                    text, date: date || null, time: time || null,
                    completed: false, completedAt: null
                });
            }
            saveTasks();
            form.reset();
        }

        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('task-text').value = task.text;
                document.getElementById('task-date').value = task.date || '';
                document.getElementById('task-time').value = task.time || '';
                editingId = id;
                submitBtn.innerText = 'Actualizar';
                cancelBtn.style.display = 'block';
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function cancelEdit() {
            editingId = null;
            form.reset();
            submitBtn.innerText = 'Agregar Pendiente';
            cancelBtn.style.display = 'none';
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                task.completedAt = task.completed ? new Date().toISOString() : null;
                if (editingId === id) cancelEdit();
                saveTasks();
            }
        }

        function deleteTask(id) {
            if(confirm("¿Borrar este pendiente?")) {
                tasks = tasks.filter(t => t.id !== id);
                if (editingId === id) cancelEdit();
                saveTasks();
            }
        }

        function clearHistory() {
            if(confirm('¿Seguro que deseas borrar TODO el historial?')) {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
            }
        }

        // --- UI & RENDERING ---

        function getUrgencyClass(dateStr, timeStr) {
            if (!dateStr) return '';
            const now = new Date();
            const target = new Date(timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T23:59:59`);
            const diffMs = target - now;
            const diffHrs = diffMs / 36e5;

            if (diffMs < 0) return 'u-overdue';
            if (timeStr && diffHrs <= 3) return diffHrs <= 1 ? 'u-1h' : (diffHrs <= 2 ? 'u-2h' : 'u-3h');

            const diffDays = Math.round((new Date(target.toDateString()) - new Date(now.toDateString())) / 864e5);
            return diffDays <= 3 ? `u-${diffDays === 0 ? 'today' : diffDays + 'd'}` : '';
        }

        function renderTasks() {
            activeList.innerHTML = '';
            completedList.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';
                const isComp = task.completed;

                if (!isComp) {
                    const urgency = getUrgencyClass(task.date, task.time);
                    if (urgency) li.classList.add(urgency);
                }

                li.innerHTML = `
                    <input type="checkbox" ${isComp ? 'checked' : ''} onchange="toggleComplete('${task.id}')">
                    <div class="task-content">
                        <p class="task-title" style="${isComp ? 'text-decoration:line-through' : ''}">${task.text}</p>
                        <p class="task-meta">
                            ${isComp ? 'Completado: ' + new Date(task.completedAt).toLocaleString() 
                                     : (task.date ? `Límite: ${task.date} ${task.time || ''}` : 'Sin límite')}
                        </p>
                    </div>
                    ${!isComp ? `<button class="btn-edit" onclick="editTask('${task.id}')">✎</button>` : ''}
                    <button class="btn-danger" onclick="deleteTask('${task.id}')">X</button>
                `;
                
                (isComp ? completedList : activeList).appendChild(li);
            });
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        init();
    </script>
</body>
</html>
