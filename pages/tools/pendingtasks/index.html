<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Pendientes</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --text-color: #333;
            --primary: #4a90e2;
            --border: #ddd;
            
            /* Gamas de colores para urgencia */
            --urgency-3d: #fff3cd; 
            --urgency-2d: #ffeeba; 
            --urgency-1d: #ffdf7e; 
            --urgency-today: #f8d7da; 
            
            --urgency-3h: #f5c6cb; 
            --urgency-2h: #f1b0b7; 
            --urgency-1h: #ea868f; 
            --overdue: #dc3545; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 650px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 1rem;
            border-bottom: 2px solid var(--border);
        }

        .tab {
            padding: 0.75rem 1.5rem;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: bold;
            color: #777;
        }

        .tab.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
            margin-bottom: -2px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        input[type="text"] { flex: 1 1 100%; }
        input[type="date"], input[type="time"] { flex: 1; }
        input, button {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        button {
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            border: none;
        }

        button:hover { background-color: #357abd; }
        
        .btn-danger { background-color: var(--overdue); }
        .btn-danger:hover { background-color: #c82333; }
        
        .btn-edit { background-color: #ffc107; color: #333; }
        .btn-edit:hover { background-color: #e0a800; }
        
        .btn-cancel { background-color: #6c757d; display: none; }
        .btn-cancel:hover { background-color: #5a6268; }

        .task-list {
            list-style: none;
            padding: 0;
        }

        .task-item {
            background: white;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: background-color 0.3s ease;
        }

        .task-content { flex: 1; }
        .task-title { margin: 0 0 0.25rem 0; font-weight: bold; }
        .task-meta { margin: 0; font-size: 0.85rem; color: #666; }

        /* Clases de urgencia inyectadas por JS */
        .u-3d { background-color: var(--urgency-3d); }
        .u-2d { background-color: var(--urgency-2d); }
        .u-1d { background-color: var(--urgency-1d); }
        .u-today { background-color: var(--urgency-today); }
        .u-3h { background-color: var(--urgency-3h); }
        .u-2h { background-color: var(--urgency-2h); }
        .u-1h { background-color: var(--urgency-1h); color: white;}
        .u-overdue { background-color: var(--overdue); color: white; }
        
        .u-1h .task-meta, .u-overdue .task-meta { color: #ffeaea; }

    </style>
</head>
<body>

    <h2>Gestor de Pendientes</h2>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('active')">Pendientes Activos</button>
        <button class="tab" onclick="switchTab('completed')">Completados</button>
    </div>

    <div id="tab-active" class="tab-content active">
        <form id="task-form" class="form-group">
            <input type="text" id="task-text" placeholder="¿Qué hay pendiente?" required>
            <input type="date" id="task-date">
            <input type="time" id="task-time">
            <button type="submit" id="submit-btn" style="flex: 1;">Agregar Pendiente</button>
            <button type="button" id="cancel-btn" class="btn-cancel" onclick="cancelEdit()">Cancelar</button>
        </form>
        <ul id="active-list" class="task-list"></ul>
    </div>

    <div id="tab-completed" class="tab-content">
        <div style="text-align: right; margin-bottom: 1rem;">
            <button class="btn-danger" onclick="clearHistory()">Limpiar Historial</button>
        </div>
        <ul id="completed-list" class="task-list"></ul>
    </div>

    <script>
        const STORAGE_KEY = 'app_pendientes_data';

        let tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let editingId = null; // Estado para saber si estamos editando

        const form = document.getElementById('task-form');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const activeList = document.getElementById('active-list');
        const completedList = document.getElementById('completed-list');

        function init() {
            renderTasks();
            form.addEventListener('submit', handleFormSubmit);
            setInterval(renderTasks, 60000); 
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
        }

        function saveTasks() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            renderTasks();
        }

        // Maneja tanto creación como actualización
        function handleFormSubmit(e) {
            e.preventDefault();
            const text = document.getElementById('task-text').value;
            const date = document.getElementById('task-date').value;
            const time = document.getElementById('task-time').value;

            if (editingId) {
                // Actualizar pendiente existente
                const taskIndex = tasks.findIndex(t => t.id === editingId);
                if (taskIndex !== -1) {
                    tasks[taskIndex].text = text;
                    tasks[taskIndex].date = date || null;
                    tasks[taskIndex].time = time || null;
                }
                cancelEdit(); // Limpia el estado de edición
            } else {
                // Agregar nuevo
                const newTask = {
                    id: Date.now().toString(),
                    text,
                    date: date || null,
                    time: time || null,
                    completed: false,
                    completedAt: null
                };
                tasks.push(newTask);
            }

            saveTasks();
            if(!editingId) form.reset();
        }

        // Carga los datos en el formulario para editar
        function editTask(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                document.getElementById('task-text').value = task.text;
                document.getElementById('task-date').value = task.date || '';
                document.getElementById('task-time').value = task.time || '';
                
                editingId = id;
                submitBtn.innerText = 'Actualizar';
                cancelBtn.style.display = 'block'; // Muestra botón de cancelar
                
                // Hace scroll hacia arriba para ver el formulario si la lista es larga
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Cancela la edición y devuelve el formulario a su estado original
        function cancelEdit() {
            editingId = null;
            form.reset();
            submitBtn.innerText = 'Agregar Pendiente';
            cancelBtn.style.display = 'none';
        }

        function toggleComplete(id) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                task.completedAt = task.completed ? new Date().toISOString() : null;
                // Si se completa mientras se edita, cancelamos la edición
                if (editingId === id) cancelEdit();
                saveTasks();
            }
        }

        function deleteTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            if (editingId === id) cancelEdit(); // Reset si se borra el que se está editando
            saveTasks();
        }

        function clearHistory() {
            if(confirm('¿Seguro que deseas borrar el historial?')) {
                tasks = tasks.filter(t => !t.completed);
                saveTasks();
            }
        }

        function getUrgencyClass(dateStr, timeStr) {
            if (!dateStr) return '';

            const now = new Date();
            const targetDateStr = timeStr ? `${dateStr}T${timeStr}` : `${dateStr}T23:59:59`;
            const target = new Date(targetDateStr);
            
            const diffMs = target - now;
            const diffHours = diffMs / (1000 * 60 * 60);

            if (diffMs < 0) return 'u-overdue';

            if (timeStr && diffHours <= 3) {
                if (diffHours <= 1) return 'u-1h';
                if (diffHours <= 2) return 'u-2h';
                return 'u-3h';
            }

            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const targetDay = new Date(target.getFullYear(), target.getMonth(), target.getDate());
            const diffCalendarDays = Math.round((targetDay - today) / (1000 * 60 * 60 * 24));

            if (diffCalendarDays === 0) return 'u-today';
            if (diffCalendarDays === 1) return 'u-1d';
            if (diffCalendarDays === 2) return 'u-2d';
            if (diffCalendarDays === 3) return 'u-3d';

            return '';
        }

        function formatDateTime(dateStr, timeStr) {
            if (!dateStr) return 'Sin fecha límite';
            let str = `Límite: ${dateStr}`;
            if (timeStr) str += ` a las ${timeStr}`;
            return str;
        }

        function formatCompletedAt(isoStr) {
            const d = new Date(isoStr);
            return `Completado el: ${d.toLocaleDateString()} a las ${d.toLocaleTimeString()}`;
        }

        function renderTasks() {
            activeList.innerHTML = '';
            completedList.innerHTML = '';

            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = 'task-item';

                if (!task.completed) {
                    const urgencyClass = getUrgencyClass(task.date, task.time);
                    if (urgencyClass) li.classList.add(urgencyClass);

                    li.innerHTML = `
                        <input type="checkbox" onchange="toggleComplete('${task.id}')">
                        <div class="task-content">
                            <p class="task-title">${task.text}</p>
                            <p class="task-meta">${formatDateTime(task.date, task.time)}</p>
                        </div>
                        <button class="btn-edit" onclick="editTask('${task.id}')" title="Editar">✎</button>
                        <button class="btn-danger" onclick="deleteTask('${task.id}')" title="Borrar">X</button>
                    `;
                    activeList.appendChild(li);
                } else {
                    li.innerHTML = `
                        <input type="checkbox" checked onchange="toggleComplete('${task.id}')">
                        <div class="task-content">
                            <p class="task-title" style="text-decoration: line-through;">${task.text}</p>
                            <p class="task-meta">${formatCompletedAt(task.completedAt)}</p>
                        </div>
                        <button class="btn-danger" onclick="deleteTask('${task.id}')" title="Borrar">X</button>
                    `;
                    completedList.appendChild(li);
                }
            });
        }

        init();
    </script>
</body>
</html>
