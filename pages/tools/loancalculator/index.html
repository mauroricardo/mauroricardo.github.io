<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Préstamos</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: #ffffff;
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 2rem;
            color: var(--text-main);
        }

        .back-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
            align-items: start;
        }

        @media (max-width: 800px) {
            .main-container {
                grid-template-columns: 1fr;
            }
        }

        .form-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .simulations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .simulation-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            border-top: 4px solid var(--primary);
            position: relative;
        }

        .sim-title {
            font-size: 1.25rem;
            margin: 0 0 15px 0;
            color: var(--primary);
            padding-right: 30px;
            word-break: break-word;
        }

        .sim-data {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .sim-data div {
            display: flex;
            flex-direction: column;
        }

        .sim-label {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .sim-value {
            font-weight: 600;
            color: var(--text-main);
        }

        .sim-result {
            background-color: #f0f9ff;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        .sim-result .sim-label {
            color: #0284c7;
        }

        .sim-result .sim-value {
            font-size: 1.5rem;
            color: #0369a1;
        }

        .delete-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            color: var(--text-muted);
            border: none;
            width: auto;
            padding: 4px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .delete-btn:hover {
            color: var(--danger);
            background: none;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px dashed var(--border);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="../../../index.html" class="back-link">← Volver al inicio</a>
        <h1>Simulador de Créditos</h1>
        <div style="width: 120px;"></div> </div>

    <div class="main-container">
        
        <div class="form-card">
            <form id="loan-form">
                <div class="form-group">
                    <label for="name">Nombre de la simulación</label>
                    <input type="text" id="name" placeholder="Ej: Crédito Vehículo" required>
                </div>
                
                <div class="form-group">
                    <label for="amount">Monto del préstamo</label>
                    <input type="text" id="amount" placeholder="$ 0" required>
                </div>

                <div class="form-group">
                    <label for="rate">Tasa Efectiva Anual (E.A. %)</label>
                    <input type="number" id="rate" step="0.01" placeholder="Ej: 15.5" required>
                </div>

                <div class="form-group">
                    <label for="term">Plazo (Meses)</label>
                    <input type="number" id="term" placeholder="Ej: 60" required>
                </div>

                <button type="submit">Agregar Simulación</button>
            </form>
        </div>

        <div class="simulations-grid" id="simulations-container">
            </div>

    </div>

    <script>
        // Funciones de formato de moneda
        const formatCurrency = (value) => {
            if (!value) return '';
            const num = parseFloat(value.toString().replace(/[^0-9]/g, ''));
            if (isNaN(num)) return '';
            return new Intl.NumberFormat('es-CO', { 
                style: 'currency', 
                currency: 'COP', 
                maximumFractionDigits: 0 
            }).format(num);
        };

        const unformatCurrency = (value) => {
            return value.toString().replace(/[^0-9]/g, '');
        };

        // Lógica del campo de monto (Focus / Blur)
        const amountInput = document.getElementById('amount');
        
        amountInput.addEventListener('focus', function() {
            this.value = unformatCurrency(this.value);
        });

        amountInput.addEventListener('blur', function() {
            if(this.value) {
                this.value = formatCurrency(this.value);
            }
        });

        // Estado y LocalStorage
        const STORAGE_KEY = 'loan_simulations_data';
        let simulations = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        const saveSimulations = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(simulations));
            renderSimulations();
        };

        // Cálculos financieros
        const calculateLoan = (amount, rateEA, months) => {
            // Convertir EA a Mensual Vencida (MV)
            const rateMV = Math.pow(1 + (rateEA / 100), 1 / 12) - 1;
            
            // Fórmula de cuota fija: P * (r(1+r)^n) / ((1+r)^n - 1)
            let cuota = 0;
            if (rateMV > 0) {
                cuota = amount * (rateMV * Math.pow(1 + rateMV, months)) / (Math.pow(1 + rateMV, months) - 1);
            } else {
                cuota = amount / months;
            }

            const totalPagado = cuota * months;
            const totalIntereses = totalPagado - amount;

            return {
                cuotaMensual: cuota,
                tasaMV: rateMV * 100,
                totalIntereses: totalIntereses
            };
        };

        // Renderizado
        const renderSimulations = () => {
            const container = document.getElementById('simulations-container');
            container.innerHTML = '';

            if (simulations.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 10px;">🏦</div>
                        <p>No tienes simulaciones guardadas.</p>
                        <p style="font-size: 0.9rem; margin-top: 5px;">Agrega tu primer cálculo usando el formulario.</p>
                    </div>
                `;
                return;
            }

            // Ordenar de más reciente a más antiguo
            const sortedSimulations = [...simulations].reverse();

            sortedSimulations.forEach(sim => {
                const results = calculateLoan(sim.amount, sim.rate, sim.term);
                
                const card = document.createElement('div');
                card.className = 'simulation-card';
                card.innerHTML = `
                    <button class="delete-btn" onclick="deleteSimulation(${sim.id})" title="Eliminar">🗑️</button>
                    <h3 class="sim-title">${sim.name}</h3>
                    
                    <div class="sim-data">
                        <div>
                            <span class="sim-label">Monto</span>
                            <span class="sim-value">${formatCurrency(sim.amount)}</span>
                        </div>
                        <div>
                            <span class="sim-label">Plazo</span>
                            <span class="sim-value">${sim.term} meses</span>
                        </div>
                        <div>
                            <span class="sim-label">Tasa E.A.</span>
                            <span class="sim-value">${sim.rate}%</span>
                        </div>
                        <div>
                            <span class="sim-label">Tasa M.V.</span>
                            <span class="sim-value">${results.tasaMV.toFixed(2)}%</span>
                        </div>
                    </div>

                    <div class="sim-data" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border);">
                         <div>
                            <span class="sim-label">Total Intereses</span>
                            <span class="sim-value">${formatCurrency(results.totalIntereses)}</span>
                        </div>
                    </div>

                    <div class="sim-result">
                        <span class="sim-label">Cuota Mensual Estimada</span>
                        <div class="sim-value">${formatCurrency(results.cuotaMensual)}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        };

        // Eliminar simulación
        window.deleteSimulation = (id) => {
            if(confirm('¿Estás seguro de que deseas eliminar esta simulación?')) {
                simulations = simulations.filter(sim => sim.id !== id);
                saveSimulations();
            }
        };

        // Manejo del formulario
        document.getElementById('loan-form').addEventListener('submit', (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const amountRaw = document.getElementById('amount').value;
            const rate = parseFloat(document.getElementById('rate').value);
            const term = parseInt(document.getElementById('term').value);

            // Extraer solo los números del campo monto
            const amount = parseFloat(unformatCurrency(amountRaw));

            if (isNaN(amount) || amount <= 0) {
                alert('Por favor, ingresa un monto válido.');
                return;
            }

            const newSimulation = {
                id: Date.now(),
                name: name,
                amount: amount,
                rate: rate,
                term: term
            };

            simulations.push(newSimulation);
            saveSimulations();

            // Limpiar formulario y reiniciar formateo
            e.target.reset();
        });

        // Inicializar
        renderSimulations();
    </script>
</body>
</html>
